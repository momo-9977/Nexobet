<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تعديل الإعلان — سمسار</title>

<style>

/* ===== BASE ===== */

body{
  margin:0;
  font-family:'Inter',Arial,sans-serif;
  background:linear-gradient(180deg,#071024,#0c1524);
  color:#e6eef8;
  padding-bottom:100px;
}

/* ===== TOP BAR ===== */

.top-bar{
  position:sticky;
  top:0;
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  z-index:1000;
}

.back-btn{
  width:38px;
  height:38px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s ease;
}

.back-btn:hover{
  background:rgba(255,255,255,0.12);
  transform:scale(1.05);
}

.page-title{
  font-weight:700;
  font-size:16px;
}

/* ===== CARD ===== */

.page{
  max-width:1000px;
  margin:25px auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.03);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* ===== FORM ===== */

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.full{
  grid-column:1/-1;
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:600;
  font-size:13px;
}

input,textarea,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  background:rgba(255,255,255,0.04);
  color:white;
  font-size:14px;
}

textarea{
  min-height:120px;
}

input:focus,textarea:focus{
  outline:none;
  border-color:#2ea3ff;
  box-shadow:0 0 0 2px rgba(46,163,255,0.2);
}

/* ===== BUTTONS ===== */

.btn{
  padding:12px 18px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  border:none;
  transition:0.2s;
}

.btn.primary{
  background:linear-gradient(135deg,#2ea3ff,#60a5fa);
  color:white;
}

.btn.warn{
  background:linear-gradient(135deg,#ef4444,#f97316);
  color:white;
}

.btn.ghost{
  background:rgba(255,255,255,0.08);
  color:white;
}

.btn:hover{
  transform:translateY(-2px);
}



@media(max-width:768px){
  .row{
    grid-template-columns:1fr;
  }
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="back-btn" onclick="window.history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </div>
  <div class="page-title">تعديل الإعلان</div>
</div>

<div class="page">

  <div class="card">
    <form id="editAdForm">

      <div class="row">
        <div>
          <label>العنوان</label>
          <input id="title" required>
        </div>

        <div>
          <label>الثمن</label>
          <input id="price" type="number">
        </div>

        <div>
          <label>المدينة</label>
          <input id="city">
        </div>

        <div>
          <label>الصنف</label>
          <select id="category">
            <option value="phones">الهواتف</option>
            <option value="cars">السيارات</option>
            <option value="homes">العقارات</option>
            <option value="furniture">الأثاث</option>
            <option value="other">أخرى</option>
          </select>
        </div>

        <div class="full">
          <label>الوصف</label>
          <textarea id="description"></textarea>
        </div>
      </div>

      <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn primary">حفظ التغييرات</button>
        <button type="button" id="deleteBtn" class="btn warn">حذف الإعلان</button>
        <a href="/profile" class="btn ghost">إلغاء</a>
      </div>

    </form>
  </div>

</div>

<!-- NAVIGATION -->

</body>
</html>
