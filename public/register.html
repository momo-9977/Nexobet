<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Samsar — إنشاء حساب بريميوم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #6366f1;
  --primary-glow: rgba(99, 102, 241, 0.5);
  --accent: #0ea5e9;
  --premium-gold: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
  --bg-dark: #030712;
  --card-bg: rgba(17, 24, 39, 0.7);
  --border-light: rgba(255, 255, 255, 0.08);
  --text-main: #f9fafb;
  --text-muted: #9ca3af;
}

* {
  box-sizing: border-box;
  font-family: 'Tajawal', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--bg-dark);
  background-image: 
    radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
    radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0, transparent 50%);
  color: var(--text-main);
  padding: 20px;
  overflow-x: hidden;
}

/* تأثير الإضاءة المتحركة في الخلفية */
body::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: var(--primary);
  filter: blur(120px);
  border-radius: 50%;
  top: 10%;
  left: 10%;
  opacity: 0.1;
  z-index: -1;
  animation: float 10s infinite alternate;
}

@keyframes float {
  from { transform: translate(0, 0); }
  to { transform: translate(50px, 50px); }
}

.auth-shell {
  width: 100%;
  max-width: 500px;
  perspective: 1000px;
}

.auth-card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-light);
  border-radius: 32px;
  padding: 40px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  position: relative;
  overflow: hidden;
}

/* وهج علوي للبطاقة */
.auth-card::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}

.brand-wrap {
  text-align: center;
  margin-bottom: 35px;
}

.brand-badge {
  width: 70px;
  height: 70px;
  background: var(--premium-gold);
  margin: 0 auto 15px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 900;
  color: #000;
  box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
  transform: rotate(-5deg);
}

.brand-title {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(to bottom, #fff 0%, #9ca3af 100%);
  -webkit-text-fill-color: transparent;
  margin: 0;
}

.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

@media (max-width: 480px) {
  .grid2 { grid-template-columns: 1fr; }
  .auth-card { padding: 25px; }
}

.field {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--text-muted);
  padding-right: 5px;
}

.input-group {
  position: relative;
}

.input-group i {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--primary);
  font-style: normal;
}

input {
  width: 100%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border-light);
  border-radius: 16px;
  padding: 15px 45px 15px 15px;
  color: #fff;
  font-size: 15px;
  transition: all 0.3s ease;
}

input:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.07);
  border-color: var(--primary);
  box-shadow: 0 0 15px var(--primary-glow);
}

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  border: none;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  color: white;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
  box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 25px rgba(99, 102, 241, 0.4);
  filter: brightness(1.1);
}

.btn:active { transform: translateY(0); }

.btn:disabled {
  background: #374151;
  cursor: not-allowed;
  transform: none;
}

.msg {
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 20px;
  font-size: 14px;
  display: none;
  text-align: center;
  animation: slideDown 0.4s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.ok { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
.msg.err { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }

.footer {
  text-align: center;
  margin-top: 25px;
  color: var(--text-muted);
  font-size: 14px;
}

.footer a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 700;
}

.footer a:hover { text-decoration: underline; }

</style>
</head>

<body>

<div class="auth-shell">
  <section class="auth-card">
    <div class="brand-wrap">
      <div class="brand-badge">S</div>
      <h1 class="brand-title">إنشاء حساب جديد</h1>
    </div>

    <div id="msg" class="msg"></div>

    <form id="form">
      <div class="grid2">
        <div class="field">
          <label>الاسم الكامل</label>
          <div class="input-group">
            <i>👤</i>
            <input id="nameInput" required autocomplete="name" placeholder="محمد الشريف">
          </div>
        </div>

        <div class="field">
          <label>رقم الهاتف</label>
          <div class="input-group">
            <i>📱</i>
            <input id="phoneInput" required autocomplete="tel" placeholder="06XXXXXXXX">
          </div>
        </div>
      </div>

      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="input-group">
          <i>📧</i>
          <input id="emailInput" type="email" required autocomplete="email" placeholder="name@example.com">
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label>كلمة المرور</label>
          <div class="input-group">
            <i>🔑</i>
            <input id="passInput" type="password" minlength="6" required autocomplete="new-password" placeholder="••••••••">
          </div>
        </div>

        <div class="field">
          <label>تأكيد المرور</label>
          <div class="input-group">
            <i>✅</i>
            <input id="confirmInput" type="password" minlength="6" required autocomplete="new-password" placeholder="••••••••">
          </div>
        </div>
      </div>

      <button class="btn" id="submitBtn" type="submit">بدء التجربة الآن</button>
    </form>

    <div class="footer">
      لديك حساب بالفعل؟ <a href="/login">تسجيل الدخول</a>
    </div>
  </section>
</div>

<script>
/* السكريبت كما هو لضمان بقاء السيرفر شغالاً بدون أي تغيير في المنطق */
const form = document.getElementById('form');
const msg = document.getElementById('msg');
const btn = document.getElementById('submitBtn');

function showMsg(text, ok=true){
  msg.style.display = 'block';
  msg.className = 'msg ' + (ok ? 'ok' : 'err');
  msg.textContent = text;
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  msg.style.display = 'none';

  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passInput').value;
  const confirm = document.getElementById('confirmInput').value;

  if(password.length < 6 || password !== confirm){
    showMsg('كلمة السر قصيرة أو التأكيد غير مطابق', false);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'جاري المعالجة...';

  try{
    const res = await fetch('/api/auth/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body: JSON.stringify({ name, phone, email, password })
    });

    const data = await res.json().catch(()=> ({}));
    if(!res.ok){
      showMsg(data.message || data.error || 'فشل إنشاء الحساب', false);
      btn.disabled = false;
      btn.textContent = 'تسجيل الحساب';
      return;
    }

    showMsg('تم إنشاء حسابك بنجاح! يتم توجيهك...', true);
    setTimeout(()=> window.location.href='/', 800);

  }catch(err){
    showMsg('خطأ في الاتصال بالسيرفر', false);
    btn.disabled = false;
    btn.textContent = 'تسجيل الحساب';
  }
});
</script>

</body>
</html>
