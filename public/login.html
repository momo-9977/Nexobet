<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Le Marché - تسجيل الدخول</title>

<style>
:root{
  --bg-0:#071024;
  --bg-1:#081426;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.05);
  --text:#f8fafc;
  --muted:#94a3b8;
  --accent:#2ea3ff;
  --accent-2:#60a5fa;
  --danger:#ef4444;

  --diamond-size:64px;
  --diamond-gap:64px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(46,163,255,0.08), transparent 20%),
    linear-gradient(180deg,var(--bg-0),var(--bg-1));
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  padding-bottom:120px;
}

/* -------- PANEL -------- */
.auth-panel{
  width:100%;
  max-width:520px;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:20px;
  padding:26px;
  backdrop-filter:blur(14px);
  box-shadow:0 20px 45px rgba(0,0,0,.45);
  animation:fadeIn .4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

h2{
  margin:0 0 6px;
  font-size:28px;
}

.lead{
  margin:0 0 20px;
  color:var(--muted);
  font-size:14px;
}

.field-box{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:14px;
}

label{
  font-size:13px;
  font-weight:700;
}

input{
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.03);
  color:white;
  font-size:14px;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:rgba(46,163,255,.5);
  box-shadow:0 0 0 6px rgba(46,163,255,.08);
}

.remember-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
  font-size:14px;
  color:var(--muted);
}

.auth-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:white;
  cursor:pointer;
  transition:.2s;
}

.auth-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 24px rgba(46,163,255,.25);
}

.auth-footer{
  margin-top:18px;
  text-align:center;
  font-size:14px;
  color:var(--muted);
}

.auth-footer a{
  color:#bfdbfe;
  text-decoration:none;
  font-weight:700;
}

/* -------- TOAST -------- */
.toast{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:12px;
  background:rgba(0,0,0,.8);
  font-weight:600;
  display:none;
  z-index:999;
}
.toast.error{background:linear-gradient(90deg,#ef4444,#c026d3)}
.toast.show{display:block}


</style>
</head>

<body>

<div class="auth-panel">
  <h2>تسجيل الدخول</h2>
  <p class="lead">دخل المعلومات ديالك باش تدخل للحساب</p>

  <form id="loginForm">
    <div class="field-box">
      <label>البريد الإلكتروني</label>
      <input type="text" id="identifier" required>
    </div>

    <div class="field-box">
      <label>كلمة المرور</label>
      <input type="password" id="password" required>
    </div>

    <div class="remember-row">
      <label><input type="checkbox" id="remember"> تذكرني</label>
      <a href="#" id="forgot">نسيت كلمة المرور؟</a>
    </div>

    <button class="auth-btn">دخول للحساب</button>
  </form>

  <div class="auth-footer">
    ما عندكش حساب؟ <a href="register.html">إنشاء حساب</a>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const form=document.getElementById("loginForm");
const toast=document.getElementById("toast");

function showToast(msg,error=false){
  toast.textContent=msg;
  toast.className="toast show"+(error?" error":"");
  setTimeout(()=>toast.classList.remove("show"),3000);
}

form.addEventListener("submit",async(e)=>{
  e.preventDefault();
  const email=document.getElementById("identifier").value.trim();
  const password=document.getElementById("password").value;

  const res=await fetch("/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password}),
    credentials:"include"
  });

  const data=await res.json().catch(()=>({}));

  if(!res.ok){
    showToast(data.message||"فشل تسجيل الدخول",true);
    return;
  }

  showToast("تم الدخول بنجاح");
  setTimeout(()=>window.location.href="/",1000);
});
</script>

</body>
</html>
