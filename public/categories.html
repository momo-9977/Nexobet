<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأقسام</title>

<style>

/* ===== NAV (UNCHANGED) ===== */
.modern-flat-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:999;
}
.modern-flat-item{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:#6b7280;
  font-size:12px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.modern-flat-nav svg{
  width:22px !important;
  height:22px !important;
}
.modern-flat-item.active{
  color:#16a34a;
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:linear-gradient(180deg,#071024,#0c1524);
  color:#e6eef8;
  padding-bottom:90px;
}

.top-bar{
  position:sticky;
  top:0;
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  z-index:1000;
}

.back-btn{
  width:38px;
  height:38px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.page{
  max-width:1200px;
  margin:30px auto;
  padding:20px;
}

/* ===== FILTER BAR ===== */
.filter-bar{
  margin-bottom:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
}

.search-input{
  flex:1;
  min-width:200px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
}

.sort-select{
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
}

/* ===== GRID ===== */
.category-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:22px;
}

.category-card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  background:#111;
  transition:.3s;
  text-decoration:none;
  color:inherit;
}

.category-card img{
  width:100%;
  height:220px;
  object-fit:cover;
  filter:brightness(.75);
}

.category-card:hover{
  transform:translateY(-6px);
}

.category-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:18px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.7));
}

.category-overlay h3{
  margin:0;
  font-size:20px;
  font-weight:800;
}

.category-overlay p{
  margin:4px 0;
  font-size:13px;
  color:#cbd5e1;
}

.category-count{
  font-size:12px;
  color:#60a5fa;
}

/* ===== SKELETON ===== */
.skeleton{
  height:220px;
  border-radius:20px;
  background:linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%);
  background-size:200% 100%;
  animation:loading 1.5s infinite;
}
@keyframes loading{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

.empty-state{
  text-align:center;
  margin-top:60px;
  color:#9aa8c2;
}

</style>
</head>
<body>

<div class="top-bar">
  <div class="back-btn" onclick="window.history.back()">←</div>
  <strong>الأقسام</strong>
</div>

<div class="page">

  <div class="filter-bar">
    <input id="searchInput" class="search-input" placeholder="بحث داخل الأقسام...">
    <select id="sortSelect" class="sort-select">
      <option value="order">الترتيب الافتراضي</option>
      <option value="name">أبجدي</option>
    </select>
  </div>

  <div id="categoriesContainer" class="category-grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <div id="emptyState" class="empty-state" style="display:none;">
    لا توجد أقسام متاحة حالياً
  </div>

</div>

<!-- NAVIGATION (UNCHANGED) -->
<nav class="modern-flat-nav">
  <a href="/" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-4v-6H8v6H4a1 1 0 0 1-1-1v-9.5z"/>
    </svg>
    <span>الرئيسية</span>
  </a>

  <a href="/categories" class="modern-flat-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M3 6h7v7H3V6zm11 0h7v7h-7V6zM3 15h7v7H3v-7zm11 0h7v7h-7v-7z"/>
    </svg>
    <span>الأقسام</span>
  </a>

  <a href="/post-ad" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span>نشر</span>
  </a>

  <a href="/profile" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="7" r="3"/>
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    </svg>
    <span>بروفايل</span>
  </a>
</nav>

<script>
const els = {
  container: document.getElementById('categoriesContainer'),
  emptyState: document.getElementById('emptyState'),
  searchInput: document.getElementById('searchInput'),
  sortSelect: document.getElementById('sortSelect'),
};

let categories = [];
let selectedCategory = ''; // key / name / id (كيف ما جاي من السيرفر)

// ---------- helpers ----------
let _debTimer = null;

function showSkeleton(){
  els.container.innerHTML = `
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  `;
  els.emptyState.style.display = 'none';
}

function escapeHtml(s=''){
  return String(s).replace(/[&<>"']/g, m => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]
  ));
}

function absUrlMaybe(u){
  const v = String(u || '').trim();
  if(!v) return '';
  if(/^https?:\/\//i.test(v) || v.startsWith('data:')) return v;
  return v.startsWith('/') ? v : ('/' + v);
}

function formatPrice(p){
  const n = Number(p);
  if(Number.isFinite(n)) return n.toLocaleString('fr-MA') + ' د.م';
  return (p ? String(p) + ' د.م' : '');
}

async function jget(url){
  const res = await fetch(url, { credentials:'include' });
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw new Error((data && (data.message || data.error)) || ('HTTP ' + res.status));
  return data;
}

function getUrlParams(){
  const sp = new URLSearchParams(location.search);
  return {
    q: sp.get('q') || '',
    category: sp.get('category') || ''
  };
}

function setUrlParams(next){
  const sp = new URLSearchParams(location.search);
  if(next.q !== undefined){
    const v = String(next.q || '').trim();
    if(v) sp.set('q', v); else sp.delete('q');
  }
  if(next.category !== undefined){
    const v = String(next.category || '').trim();
    if(v) sp.set('category', v); else sp.delete('category');
  }
  const url = location.pathname + (sp.toString() ? ('?' + sp.toString()) : '');
  history.pushState({}, '', url);
}

// ---------- UI modes ----------
// mode = 'categories' => عرض الأقسام
// mode = 'ads'        => عرض الإعلانات
let mode = 'categories';

function showEmpty(msg){
  els.container.innerHTML = '';
  els.emptyState.style.display = 'block';
  els.emptyState.textContent = msg || 'لا توجد نتائج';
}

// ---------- render categories ----------
function renderCategories(){
  mode = 'categories';
  els.container.innerHTML = '';

  if(!categories.length){
    showEmpty('لا توجد أقسام متاحة حالياً');
    return;
  }

  els.emptyState.style.display = 'none';

  categories.forEach(cat=>{
    const key = String(cat.key || cat.id || cat.name || '').trim();
    const name = cat.name || key || '—';

    const card = document.createElement('a');
    card.href = 'javascript:void(0)';
    card.className = 'category-card';

    const imgSrc = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0b1222"/>
            <stop offset="1" stop-color="#121c33"/>
          </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#g)"/>
        <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle"
          fill="#93a3bf" font-size="30" font-family="Arial">${escapeHtml(name)}</text>
        <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle"
          fill="#6fa8ff" font-size="16" font-family="Arial">اضغط لعرض الإعلانات</text>
      </svg>`
    );

    card.innerHTML = `
      <img src="${imgSrc}" alt="${escapeHtml(name)}">
      <div class="category-overlay">
        <h3>${escapeHtml(name)}</h3>
        <p>اضغط لعرض الإعلانات داخل هذا القسم</p>
        <div class="category-count">—</div>
      </div>
    `;

    card.addEventListener('click', ()=>{
      selectedCategory = key;
      setUrlParams({ category: selectedCategory }); // ✅ url كيولي ?category=...
      loadAds(); // ✅ نفس الصفحة كتجيب الإعلانات
    });

    els.container.appendChild(card);
  });
}

// ---------- render ads ----------
function renderAds(items){
  mode = 'ads';
  els.container.innerHTML = '';

  if(!items.length){
    showEmpty(selectedCategory ? 'لا توجد إعلانات في هذا القسم حالياً' : 'لا توجد نتائج حالياً');
    return;
  }

  els.emptyState.style.display = 'none';

  items.forEach(ad=>{
    const id = ad.id || ad._id || '';
    const title = ad.title || '—';
    const city  = ad.city || '';
    const price = formatPrice(ad.price);
    const img   = absUrlMaybe(ad.image) || 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500">
        <rect width="100%" height="100%" fill="#0b1222"/>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
          fill="#93a3bf" font-size="26" font-family="Arial">No Image</text>
      </svg>`
    );

    const card = document.createElement('a');
    card.href = '/ad?id=' + encodeURIComponent(id);
    card.className = 'category-card';

    card.innerHTML = `
      <img src="${escapeHtml(img)}" alt="${escapeHtml(title)}">
      <div class="category-overlay">
        <h3>${escapeHtml(title)}</h3>
        <p>${escapeHtml(city)}</p>
        <div class="category-count">${escapeHtml(price)}</div>
      </div>
    `;

    els.container.appendChild(card);
  });
}

// ---------- loaders ----------
async function loadCategories(){
  showSkeleton();
  try{
    const data = await jget('/api/categories'); // السيرفر الحالي
    categories = Array.isArray(data) ? data : [];
    renderCategories();
  }catch(e){
    categories = [];
    showEmpty('لا توجد أقسام متاحة حالياً');
  }
}

async function loadAds(){
  showSkeleton();

  const q = (els.searchInput.value || '').trim();

  // ✅ حدّث URL ب q
  setUrlParams({ q });

  const params = new URLSearchParams();
  if(q) params.set('q', q);
  if(selectedCategory) params.set('category', selectedCategory);
  params.set('limit', '50');

  try{
    const ads = await jget('/api/ads?' + params.toString());
    renderAds(Array.isArray(ads) ? ads : []);
  }catch(e){
    renderAds([]);
  }
}

// ---------- events ----------
els.searchInput.addEventListener('input', ()=>{
  clearTimeout(_debTimer);
  _debTimer = setTimeout(()=>{
    // إذا مازال ما اختارش قسم وكيكتب فالبحث: نقدر نخليه يجيب ads عامة
    loadAds();
  }, 250);
});

els.sortSelect.addEventListener('change', ()=>{
  // حاليا sorting من السيرفر ما كاينش، نخليه يعاود يجيب
  if(mode === 'ads') loadAds();
});

// back/forward browser
window.addEventListener('popstate', ()=>{
  const p = getUrlParams();
  els.searchInput.value = p.q || '';
  selectedCategory = p.category || '';

  if(selectedCategory || (p.q && p.q.trim())){
    loadAds();
  }else{
    renderCategories();
  }
});

// ---------- init ----------
(async function init(){
  const p = getUrlParams();

  // حمّل الأقسام دائما أولاً
  await loadCategories();

  // إذا جاك الرابط فيه category ولا q: عرض الإعلانات مباشرة
  if(p.category || (p.q && p.q.trim())){
    selectedCategory = p.category || '';
    els.searchInput.value = p.q || '';
    loadAds();
  }
})();
</script>

</body>
</html>
