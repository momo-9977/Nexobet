<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>تعديل الإعلان</title>

<style>
:root{
  --bg-0:#071024;
  --bg-1:#081426;
  --card-bg:rgba(255,255,255,0.03);
  --card-border:rgba(255,255,255,0.06);
  --text:#e6eef8;
  --muted:#9aa8c2;
  --accent:#2ea3ff;
  --accent-2:#60a5fa;
  --danger:#ef4444;
  --ok:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(46,163,255,0.08), transparent 20%),
    linear-gradient(180deg,var(--bg-0),var(--bg-1));
  color:var(--text);
  padding-bottom:90px;
}

.page{max-width:980px;margin:18px auto;padding:18px}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.topbar .title{
  font-size:18px;
  font-weight:800;
}

.btn{
  border:none;
  border-radius:14px;
  padding:12px 14px;
  cursor:pointer;
  font-weight:800;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;
}
.btn-ghost{
  background:rgba(255,255,255,.05);
  color:var(--text);
  border:1px solid var(--card-border);
}
.btn-danger{
  background:rgba(239,68,68,.14);
  color:#ffd9d9;
  border:1px solid rgba(239,68,68,.35);
}

.card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:18px;
  padding:16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:820px){
  .grid{grid-template-columns:1fr}
}

.field label{
  display:block;
  font-size:12px;
  color:rgba(255,255,255,.75);
  margin-bottom:6px;
}
.field input, .field select, .field textarea{
  width:100%;
  padding:12px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  outline:none;
  background:rgba(255,255,255,.04);
  color:var(--text);
}
.field textarea{min-height:120px;resize:vertical}

.hr{height:1px;background:rgba(255,255,255,.08);margin:16px 0}

.msg{
  margin:10px 0 0;
  font-size:13px;
  color:rgba(255,255,255,.8);
}
.msg.err{color:#ffb4b4}
.msg.ok{color:#a7ffcf}

/* images */
.images-wrap{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}
.img-tile{
  border-radius:16px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.03);
  overflow:hidden;
  position:relative;
}
.img-tile img{
  width:100%;
  height:140px;
  object-fit:cover;
  display:block;
}
.img-actions{
  position:absolute;
  top:8px;
  left:8px;
  display:flex;
  gap:8px;
}
.iconbtn{
  width:36px;height:36px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.35);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.iconbtn.danger{
  border-color:rgba(239,68,68,.45);
  background:rgba(239,68,68,.22);
}
.small-note{font-size:12px;color:rgba(255,255,255,.65);margin-top:8px}

.footer-actions{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  flex-wrap:wrap;
}
</style>
</head>

<body>
<div class="page">

  <div class="topbar">
    <button class="btn btn-ghost" onclick="location.href='/profile'">رجوع</button>
    <div class="title">تعديل الإعلان</div>
    <button class="btn btn-danger" id="deleteBtn">حذف الإعلان</button>
  </div>

  <div class="card">
    <div id="statusMsg" class="msg"></div>

    <div class="grid" style="margin-top:10px">
      <div class="field">
        <label>العنوان</label>
        <input id="title" placeholder="العنوان">
      </div>

      <div class="field">
        <label>الثمن</label>
        <input id="price" type="number" min="0" step="1" placeholder="0">
      </div>

      <div class="field">
        <label>المدينة</label>
        <input id="city" placeholder="مثال: Rabat">
      </div>

      <div class="field">
        <label>الصنف</label>
        <select id="category"></select>
      </div>

      <div class="field" style="grid-column:1/-1">
        <label>الوصف</label>
        <textarea id="description" placeholder="وصف الإعلان..."></textarea>
      </div>
    </div>

    <div class="hr"></div>

    <div style="font-weight:800;margin-bottom:10px">الصور الحالية</div>
    <div id="imagesWrap" class="images-wrap"></div>
    <div class="small-note">يمكنك حذف صورة بوحدها. إذا بغيتي تزيد صور جداد، استعمل الاختيار لتحت.</div>

    <div class="hr"></div>

    <div class="grid">
      <div class="field">
        <label>إضافة صور جديدة</label>
        <input id="newImages" type="file" accept="image/*" multiple>
        <div class="small-note">الصور الجديدة كيتزادو على الصور القديمة (ماشي استبدال).</div>
      </div>
    </div>

    <div class="hr"></div>

    <div class="footer-actions">
      <button class="btn btn-ghost" onclick="location.reload()">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">حفظ التغييرات</button>
    </div>

  </div>
</div>

<script>
/* ===========================
   helpers
=========================== */
function qs(key){
  const u = new URL(location.href);
  return u.searchParams.get(key);
}
async function jget(url){
  const res = await fetch(url, { credentials:'include' });
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw new Error((data && (data.message || data.error)) || ('HTTP ' + res.status));
  return data;
}
async function jsend(url, method, body){
  const res = await fetch(url, { method, body, credentials:'include' });
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw new Error((data && (data.message || data.error)) || ('HTTP ' + res.status));
  return data;
}
function safeText(s){ return String(s || '').trim(); }
function absUrlMaybe(u){
  const v = safeText(u);
  if(!v) return '';
  if(/^https?:\/\//i.test(v) || v.startsWith('data:')) return v;
  return v.startsWith('/') ? v : ('/' + v);
}
function setMsg(text, ok){
  const el = document.getElementById('statusMsg');
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.textContent = text || '';
}

/* ===========================
   load
=========================== */
const adId = qs('id');
if(!adId){
  setMsg('معرف الإعلان ناقص.', false);
}

let currentImages = []; // [{id,url,ord}]

async function loadCategories(){
  const sel = document.getElementById('category');
  sel.innerHTML = '';
  const cats = await jget('/api/categories');
  (Array.isArray(cats)?cats:[]).forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.key || c.id;
    opt.textContent = c.name || c.key || c.id;
    sel.appendChild(opt);
  });
}

async function loadAd(){
  const ad = await jget('/api/ads/' + encodeURIComponent(adId));

  document.getElementById('title').value = ad.title || '';
  document.getElementById('price').value = (ad.price ?? '');
  document.getElementById('city').value = ad.city || '';
  document.getElementById('description').value = ad.description || '';

  // category: if server stores category_id, UI expects key/id string; we try both
  const sel = document.getElementById('category');
  const catVal = (ad.category_id ?? ad.category ?? '');
  if(catVal){
    // try set directly
    sel.value = String(catVal);
  }

  currentImages = Array.isArray(ad.images) ? ad.images : [];
  renderImages();
}

function renderImages(){
  const wrap = document.getElementById('imagesWrap');
  wrap.innerHTML = '';

  if(!currentImages.length){
    wrap.innerHTML = `<div style="color:rgba(255,255,255,.65)">لا توجد صور</div>`;
    return;
  }

  wrap.innerHTML = currentImages.map(img=>`
    <div class="img-tile">
      <img src="${absUrlMaybe(img.url)}" alt="">
      <div class="img-actions">
        <button class="iconbtn danger" title="حذف" onclick="deleteImage('${img.id}')">
          🗑
        </button>
      </div>
    </div>
  `).join('');
}

async function deleteImage(imgId){
  if(!confirm('واش متأكد بغيتي تحذف هاد الصورة؟')) return;
  try{
    await jsend('/api/ads/' + encodeURIComponent(adId) + '/images/' + encodeURIComponent(imgId), 'DELETE');
    currentImages = currentImages.filter(x=> String(x.id) !== String(imgId));
    renderImages();
    setMsg('تم حذف الصورة.', true);
  }catch(e){
    setMsg('فشل حذف الصورة: ' + e.message, false);
  }
}

/* ===========================
   Save
=========================== */
document.getElementById('saveBtn').addEventListener('click', async ()=>{
  try{
    setMsg('', true);

    const fd = new FormData();
    fd.append('title', document.getElementById('title').value.trim());
    fd.append('price', document.getElementById('price').value.trim());
    fd.append('city', document.getElementById('city').value.trim());
    fd.append('category', document.getElementById('category').value);
    fd.append('description', document.getElementById('description').value.trim());

    const files = document.getElementById('newImages').files;
    for(const f of files){
      fd.append('images', f);
    }

    await jsend('/api/ads/' + encodeURIComponent(adId), 'PUT', fd);
    setMsg('تم حفظ التغييرات بنجاح ✅', true);

    // reload ad data (to refresh images etc.)
    await loadAd();
    document.getElementById('newImages').value = '';
  }catch(e){
    setMsg('فشل حفظ التغييرات: ' + e.message, false);
  }
});

/* ===========================
   Delete ad
=========================== */
document.getElementById('deleteBtn').addEventListener('click', async ()=>{
  if(!confirm('واش متأكد بغيتي تحذف الإعلان نهائياً؟')) return;
  try{
    await jsend('/api/ads/' + encodeURIComponent(adId), 'DELETE');
    location.href = '/profile';
  }catch(e){
    setMsg('فشل حذف الإعلان: ' + e.message, false);
  }
});

/* ===========================
   init
=========================== */
(async function init(){
  try{
    await loadCategories();
    await loadAd();
  }catch(e){
    setMsg('تعذر تحميل الإعلان: ' + e.message, false);
  }
})();
</script>

</body>
</html>
