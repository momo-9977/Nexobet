<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Le Marché</title>

<style>
:root{
  --bg-0:#071024;
  --bg-1:#081426;
  --card-bg:rgba(255,255,255,0.03);
  --card-border:rgba(255,255,255,0.04);
  --text:#e6eef8;
  --muted:#9aa8c2;
  --accent:#2ea3ff;
  --accent-2:#60a5fa;
  --success:#34d399;

  --diamond-size-desktop:64px;
  --diamond-size-mobile:52px;
  --diamond-gap-desktop:64px;
  --diamond-gap-mobile:30px;
  --nav-bottom-offset:calc(20px + env(safe-area-inset-bottom,0px));
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
  radial-gradient(circle at 10% 10%, rgba(46,163,255,0.06), transparent 12%),
  linear-gradient(180deg,var(--bg-0),var(--bg-1));
  color:var(--text);
  padding-bottom:90px;
}

.page{max-width:1180px;margin:20px auto;padding:18px}

/* ---------- HEADER ---------- */
.home-brand-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--card-border);
}

.home-logo-shell{
  width:56px;height:56px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#043b66,#0b7bd6);
  font-weight:800;font-size:18px
}

.home-brand-text h1{margin:0;font-size:20px}
.home-brand-text p{margin:0;color:var(--muted);font-size:13px}

/* ---------- CARD ---------- */
.home-card{
  background:var(--card-bg);
  border-radius:14px;
  padding:18px;
  margin-top:20px;
  border:1px solid var(--card-border);
}

/* ---------- HERO ---------- */
.hero-slider{
  position:relative;
  min-height:260px;
  border-radius:12px;
  overflow:hidden;
}
.hero-slide{
  position:absolute;inset:0;
  opacity:0;
  transition:opacity .4s ease;
  background-size:cover;
  background-position:center;
}
.hero-slide.active{opacity:1}
.hero-slide::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.4),rgba(0,0,0,.6));
}
.hero-slide-content{
  position:relative;z-index:2;
  padding:30px;
}
.hero-slide-content h2{margin:0 0 10px;font-size:28px}
.hero-slide-content p{color:var(--muted)}

.hero-arrow{
  position:absolute;top:50%;
  transform:translateY(-50%);
  width:50px;height:50px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:none;color:white;
  cursor:pointer;font-size:22px
}
.hero-arrow.left{left:15px}
.hero-arrow.right{right:15px}

/* ---------- SEARCH ---------- */
.search-panel{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
}
.search-box input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.05);
  background:rgba(0,0,0,.3);
  color:white;
}
.search-main-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  border:none;
  padding:12px 18px;
  border-radius:12px;
  font-weight:700;
  color:white;
  cursor:pointer;
}

/* ---------- ADS ---------- */
.ads-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-top:15px;
}
.ad-card{
  background:rgba(255,255,255,0.03);
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.04);
  transition:.3s;
}
.ad-card:hover{transform:translateY(-6px)}
.ad-image{
  width:100%;height:200px;
  object-fit:cover;
}
.ad-content{padding:14px}
.ad-title{margin:8px 0;font-size:18px}
.ad-desc{color:var(--muted);font-size:14px}
.ad-price{font-weight:800;margin-top:10px}


</style>
</head>
<body>

<div class="page">

<header class="home-brand-bar">
  <div style="display:flex;gap:12px;align-items:center">
    <div class="home-logo-shell">LM</div>
    <div class="home-brand-text">
      <h1>Le Marché</h1>
      <p>Vendre et acheter facilement</p>
    </div>
  </div>
</header>

<section class="home-card">
  <div class="hero-slider" id="heroSlider">
    <div class="hero-slide active" style="background-image:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop')">
      <div class="hero-slide-content">
        <h2>مرحبا بك في Le Marché</h2>
        <p>بيع وشراء بسهولة</p>
      </div>
    </div>
  </div>
  <button class="hero-arrow left">‹</button>
  <button class="hero-arrow right">›</button>
</section>

</div>

<!-- NAVIGATION -->
<nav class="modern-flat-nav">
  <a href="/categories" class="modern-flat-item"></a>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-4v-6H8v6H4a1 1 0 0 1-1-1v-9.5z"/>
    </svg>
    <span>الرئيسية</span>
  </a>

  <a href="/categories" class="modern-flat-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M3 6h7v7H3V6zm11 0h7v7h-7V6zM3 15h7v7H3v-7zm11 0h7v7h-7v-7z"/>
    </svg>
    <span>الأقسام</span>
  </a>

  <a href="/post-ad" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span>نشر</span>
  </a>

  <a href="/profile" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="7" r="3"/>
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    </svg>
    <span>بروفايل</span>
  </a>
</nav>

<script>
  const currentPath = window.location.pathname;
  document.querySelectorAll(".modern-flat-item").forEach(link=>{
    if(link.getAttribute("href") === currentPath){
      link.classList.add("active");
    }
  });
</script>
</body>
</html>
