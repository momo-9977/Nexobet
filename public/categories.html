<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأقسام</title>

<style>

/* ===== NAV (UNCHANGED) ===== */
.modern-flat-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:999;
}
.modern-flat-item{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:#6b7280;
  font-size:12px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.modern-flat-nav svg{
  width:22px !important;
  height:22px !important;
}
.modern-flat-item.active{
  color:#16a34a;
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:linear-gradient(180deg,#071024,#0c1524);
  color:#e6eef8;
  padding-bottom:90px;
}

.top-bar{
  position:sticky;
  top:0;
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  z-index:1000;
}

.back-btn{
  width:38px;
  height:38px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.page{
  max-width:1200px;
  margin:30px auto;
  padding:20px;
}

/* ===== FILTER BAR (READY FOR FUTURE) ===== */
.filter-bar{
  margin-bottom:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
}

.search-input{
  flex:1;
  min-width:200px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

.sort-select{
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

/* ===== GRID ===== */
.category-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:22px;
}

.category-card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  background:#111;
  transition:.3s;
}

.category-card img{
  width:100%;
  height:220px;
  object-fit:cover;
  filter:brightness(.75);
}

.category-card:hover{
  transform:translateY(-6px);
}

.category-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:18px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.7));
}

.category-overlay h3{
  margin:0;
  font-size:20px;
  font-weight:800;
}

.category-overlay p{
  margin:4px 0;
  font-size:13px;
  color:#cbd5e1;
}

.category-count{
  font-size:12px;
  color:#60a5fa;
}

/* ===== SKELETON ===== */
.skeleton{
  height:220px;
  border-radius:20px;
  background:linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%);
  background-size:200% 100%;
  animation:loading 1.5s infinite;
}
@keyframes loading{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

.empty-state{
  text-align:center;
  margin-top:60px;
  color:#9aa8c2;
}

</style>
</head>
<body>

<div class="top-bar">
  <div class="back-btn" onclick="window.history.back()">←</div>
  <strong>الأقسام</strong>
</div>

<div class="page">

  <!-- FILTER UI (READY FOR BACKEND) -->
  <div class="filter-bar">
    <input id="searchInput" class="search-input" placeholder="بحث داخل الأقسام...">
    <select id="sortSelect" class="sort-select">
      <option value="order">الترتيب الافتراضي</option>
      <option value="adsCount">الأكثر إعلانات</option>
      <option value="name">أبجدي</option>
    </select>
  </div>

  <!-- GRID -->
  <div id="categoriesContainer" class="category-grid">
    <!-- Skeleton Loading -->
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <div id="emptyState" class="empty-state" style="display:none;">
    لا توجد أقسام متاحة حالياً
  </div>

</div>

<!-- NAVIGATION (UNCHANGED) -->
<nav class="modern-flat-nav">
  <a href="/" class="modern-flat-item">
    <span>الرئيسية</span>
  </a>
  <a href="/categories" class="modern-flat-item active">
    <span>الأقسام</span>
  </a>
  <a href="/post-ad" class="modern-flat-item">
    <span>نشر</span>
  </a>
  <a href="/profile" class="modern-flat-item">
    <span>بروفايل</span>
  </a>
</nav>

<script>

/* ===== FETCH CATEGORIES FROM EXPRESS ===== */
async function loadCategories(){
  const container = document.getElementById('categoriesContainer');
  const emptyState = document.getElementById('emptyState');

  try{
    const res = await fetch('/api/categories');
    const categories = await res.json();

    container.innerHTML = '';

    if(!categories.length){
      emptyState.style.display = 'block';
      return;
    }

    categories.forEach(cat=>{
      if(!cat.active) return;

      const card = document.createElement('a');
      card.href = `/category.html?key=${cat.id}`;
      card.className = 'category-card';
      card.dataset.id = cat.id;

      card.innerHTML = `
        <img src="${cat.image}" alt="${cat.name}">
        <div class="category-overlay">
          <h3>${cat.name}</h3>
          <p>${cat.description || ''}</p>
          <div class="category-count">${cat.adsCount || 0} إعلان</div>
        </div>
      `;

      container.appendChild(card);
    });

  }catch(err){
    container.innerHTML = '';
    emptyState.style.display = 'block';
  }
}

loadCategories();

</script>

</body>
</html>
