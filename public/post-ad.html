<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Samsar - نشر إعلان</title>

<style>
:root{
  --bg-0:#071024;
  --bg-1:#081426;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.05);
  --text:#e6eef8;
  --muted:#9aa8c2;
  --accent:#2ea3ff;
  --accent-2:#60a5fa;
  --success:#34d399;
  --danger:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(46,163,255,0.08), transparent 20%),
    linear-gradient(180deg,var(--bg-0),var(--bg-1));
  color:var(--text);
  padding-bottom:90px;
}

.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:48px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(6px);
  z-index:100;
}

.container{
  max-width:900px;
  margin:80px auto 40px;
  padding:20px;
}

.card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  padding:24px;
  border-radius:20px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 45px rgba(0,0,0,.4);
}

label{
  font-weight:700;
  font-size:14px;
}

input,textarea,select{
  width:100%;
  padding:14px;
  margin:8px 0 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.03);
  color:white;
  font-size:14px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-weight:800;
  font-size:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:white;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.error{color:var(--danger);margin-bottom:10px}
.success{color:var(--success);margin-bottom:10px}

.preview{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.preview img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:12px;
}

.progress-bar{
  height:8px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress{
  height:100%;
  width:0%;
  background:var(--accent);
  transition:.2s;
}

.dynamic-fields{
  margin-top:10px;
}

/* ===== NAV (UNCHANGED) ===== */

.modern-flat-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:999;
}

.modern-flat-item{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:#6b7280;
  font-size:12px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.modern-flat-nav svg{
  width:22px !important;
  height:22px !important;
}

.modern-flat-item.active{
  color:#16a34a;
}
</style>
</head>

<body>

<div class="back-btn" onclick="history.back()">←</div>

<div class="container">
<div class="card">

<h2>نشر إعلان جديد</h2>

<div id="errorBox" class="error"></div>
<div id="statusBox" class="success"></div>

<form id="postForm">

<input type="hidden" id="csrfToken">

<label>العنوان</label>
<input id="title" required>

<label>الوصف</label>
<textarea id="description" rows="4" required></textarea>

<label>الثمن</label>
<input type="number" id="price" min="0" required>

<label>المدينة</label>
<input id="city">

<label>التصنيف</label>
<select id="category" required></select>

<div id="dynamicFields" class="dynamic-fields"></div>

<label>صور</label>
<input type="file" id="images" multiple accept="image/*">
<div class="preview" id="imagePreview"></div>

<label>فيديو</label>
<input type="file" id="video" accept="video/*">
<video id="videoPreview" width="200" controls style="display:none;margin-top:10px"></video>

<div class="progress-bar">
  <div class="progress" id="uploadProgress"></div>
</div>

<button id="submitBtn" type="submit">نشر الإعلان</button>

</form>
</div>
</div>

<!-- NAVIGATION (UNCHANGED) -->
<nav class="modern-flat-nav">
  <a href="/" class="modern-flat-item"><span>الرئيسية</span></a>
  <a href="/categories" class="modern-flat-item"><span>الأقسام</span></a>
  <a href="/post-ad" class="modern-flat-item active"><span>نشر</span></a>
  <a href="/profile" class="modern-flat-item"><span>بروفايل</span></a>
</nav>

<script>

/* ===== LOAD CSRF TOKEN ===== */
async function loadCSRF(){
  const res = await fetch('/api/csrf-token');
  const data = await res.json();
  document.getElementById('csrfToken').value = data.token;
}
loadCSRF();

/* ===== LOAD CATEGORIES FROM SERVER ===== */
async function loadCategories(){
  const res = await fetch('/api/categories');
  const categories = await res.json();
  const select = document.getElementById('category');

  select.innerHTML = '<option value="">اختر القسم</option>';
  categories.forEach(cat=>{
    if(cat.active){
      const option = document.createElement('option');
      option.value = cat.id;
      option.textContent = cat.name;
      select.appendChild(option);
    }
  });
}
loadCategories();

/* ===== DYNAMIC FIELDS BASED ON CATEGORY ===== */
document.getElementById('category').addEventListener('change', e=>{
  const container = document.getElementById('dynamicFields');
  container.innerHTML = '';

  if(e.target.value === 'cars'){
    container.innerHTML = `
      <label>الموديل</label>
      <input name="model">
      <label>السنة</label>
      <input type="number" name="year">
    `;
  }
});

/* ===== IMAGE PREVIEW ===== */
document.getElementById('images').addEventListener('change', e=>{
  const preview = document.getElementById('imagePreview');
  preview.innerHTML='';
  Array.from(e.target.files).forEach(file=>{
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

/* ===== VIDEO PREVIEW ===== */
document.getElementById('video').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const video = document.getElementById('videoPreview');
  video.src = URL.createObjectURL(file);
  video.style.display='block';
});

/* ===== FORM SUBMIT WITH PROGRESS ===== */
document.getElementById('postForm').addEventListener('submit', async e=>{
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'جارٍ الإرسال...';

  const formData = new FormData(e.target);

  const xhr = new XMLHttpRequest();
  xhr.open('POST','/api/ads');

  xhr.upload.onprogress = e=>{
    if(e.lengthComputable){
      const percent = (e.loaded/e.total)*100;
      document.getElementById('uploadProgress').style.width = percent + '%';
    }
  };

  xhr.onload = ()=>{
    btn.disabled=false;
    btn.textContent='نشر الإعلان';
    if(xhr.status === 200){
      document.getElementById('statusBox').textContent='تم النشر بنجاح ✔';
      e.target.reset();
    }else{
      document.getElementById('errorBox').textContent='فشل النشر';
    }
  };

  xhr.send(formData);
});

</script>

</body>
</html>
