<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Samsar — تسجيل الدخول</title>

<style>
  :root{
    --bg-0:#050b18;
    --bg-1:#0a1326;
    --bg-2:#0f1d38;
    --card-bg:rgba(255,255,255,0.06);
    --card-border:rgba(255,255,255,0.10);
    --text:#edf4ff;
    --muted:#9fb0d0;
    --accent:#38bdf8;
    --accent-2:#2563eb;
    --premium:#f59e0b;
    --premium-2:#fde68a;
    --shadow:0 30px 80px rgba(0,0,0,.45);
    --glow:0 0 0 1px rgba(255,255,255,.05), 0 20px 50px rgba(37,99,235,.18);
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    font-family:Inter,Arial,sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 15% 20%, rgba(56,189,248,.16), transparent 22%),
      radial-gradient(circle at 85% 15%, rgba(245,158,11,.14), transparent 20%),
      radial-gradient(circle at 50% 100%, rgba(37,99,235,.18), transparent 30%),
      linear-gradient(180deg,var(--bg-0),var(--bg-1) 45%,var(--bg-2));
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow-x:hidden;
  }

  body::before,
  body::after{
    content:"";
    position:fixed;
    inset:auto;
    pointer-events:none;
    z-index:0;
    filter:blur(60px);
    opacity:.55;
  }

  body::before{
    width:260px;height:260px;
    top:6%;right:8%;
    background:radial-gradient(circle, rgba(245,158,11,.28), transparent 70%);
  }

  body::after{
    width:320px;height:320px;
    bottom:4%;left:6%;
    background:radial-gradient(circle, rgba(56,189,248,.22), transparent 70%);
  }

  .login-shell{
    position:relative;
    z-index:1;
    width:100%;
    max-width:470px;
  }

  .login-card{
    position:relative;
    border-radius:28px;
    padding:28px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    border:1px solid var(--card-border);
    box-shadow:var(--shadow), var(--glow);
    backdrop-filter:blur(18px);
    overflow:hidden;
  }

  .login-card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(135deg, rgba(255,255,255,.10), transparent 30%, transparent 70%, rgba(255,255,255,.04));
    pointer-events:none;
  }

  .login-card::after{
    content:"";
    position:absolute;
    top:-90px;
    left:-60px;
    width:220px;
    height:220px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(56,189,248,.18), transparent 70%);
    pointer-events:none;
  }

  .brand-wrap{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    margin-bottom:24px;
  }

  .brand-badge{
    width:84px;
    height:84px;
    border-radius:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      linear-gradient(135deg, rgba(245,158,11,.96), rgba(253,230,138,.95));
    color:#0f172a;
    font-size:30px;
    font-weight:900;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.6),
      0 18px 40px rgba(245,158,11,.28);
    border:1px solid rgba(255,255,255,.35);
    margin-bottom:14px;
  }

  .brand-title{
    margin:0;
    font-size:28px;
    font-weight:900;
    letter-spacing:.3px;
    background:linear-gradient(135deg,#ffffff,#dbeafe 55%,#fde68a);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .brand-sub{
    margin:8px 0 0;
    color:var(--muted);
    font-size:14px;
    line-height:1.8;
  }

  .form{
    position:relative;
    z-index:1;
    display:grid;
    gap:14px;
  }

  .field{
    position:relative;
  }

  .field label{
    display:block;
    margin:0 0 8px;
    font-size:13px;
    font-weight:800;
    color:#dbe7ff;
  }

  .input-wrap{
    position:relative;
  }

  .input-icon{
    position:absolute;
    top:50%;
    right:14px;
    transform:translateY(-50%);
    width:22px;
    height:22px;
    opacity:.86;
    color:#dbeafe;
    pointer-events:none;
  }

  .form input{
    width:100%;
    height:56px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.045);
    color:var(--text);
    outline:none;
    padding:0 48px 0 16px;
    font-size:15px;
    transition:.18s ease;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
  }

  .form input::placeholder{
    color:#8da0c3;
  }

  .form input:focus{
    border-color:rgba(56,189,248,.55);
    background:rgba(255,255,255,.07);
    box-shadow:
      0 0 0 4px rgba(56,189,248,.10),
      0 10px 30px rgba(37,99,235,.14);
  }

  .submit-btn{
    margin-top:8px;
    height:58px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    font-size:16px;
    font-weight:900;
    color:#fff;
    background:
      linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.18),
      0 18px 35px rgba(37,99,235,.28);
    transition:.18s ease;
  }

  .submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.18),
      0 24px 40px rgba(37,99,235,.34);
  }

  .submit-btn:active{
    transform:translateY(0);
  }

  .form-foot{
    margin-top:14px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
  }

  .form-foot a{
    color:#fde68a;
    text-decoration:none;
    font-weight:800;
  }

  .toast{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:24px;
    min-width:220px;
    max-width:90vw;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(0,0,0,.72);
    border:1px solid rgba(255,255,255,.12);
    color:#fff;
    text-align:center;
    font-weight:800;
    display:none;
    z-index:20;
    box-shadow:0 16px 40px rgba(0,0,0,.45);
  }

  .toast.show{display:block}
  .toast.success{
    background:linear-gradient(135deg, rgba(16,185,129,.42), rgba(5,150,105,.28));
  }
  .toast.error{
    background:linear-gradient(135deg, rgba(239,68,68,.42), rgba(185,28,28,.28));
  }

  @media (max-width:560px){
    body{padding:16px}
    .login-card{
      border-radius:24px;
      padding:22px 18px;
    }
    .brand-badge{
      width:72px;
      height:72px;
      border-radius:22px;
      font-size:26px;
    }
    .brand-title{
      font-size:24px;
    }
    .form input,
    .submit-btn{
      height:54px;
      border-radius:16px;
    }
  }
</style>
</head>

<body>

  <div class="login-shell">
    <div class="login-card">
      <div class="brand-wrap">
        <div class="brand-badge">S</div>
        <h1 class="brand-title">تسجيل الدخول</h1>
      </div>

      <form class="form" id="loginForm">
        <div class="field">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 6h16v12H4z"/>
              <path d="M4 7l8 6 8-6"/>
            </svg>
            <input id="email" name="email" type="email" placeholder="name@example.com" autocomplete="email" required />
          </div>
        </div>

        <div class="field">
          <label for="password">كلمة السر</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="5" y="11" width="14" height="9" rx="2"/>
              <path d="M8 11V8a4 4 0 1 1 8 0v3"/>
            </svg>
            <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>
        </div>

        <button class="submit-btn" id="loginBtn" type="submit">تسجيل الدخول</button>

        <div class="form-foot">
          <a href="/register">إنشاء حساب</a>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const qs = (s) => document.querySelector(s);

  function apiOpts(method='GET', body=null){
    const opts = { method, credentials:'include', headers:{} };
    if(body && !(body instanceof FormData)){
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }else if(body instanceof FormData){
      opts.body = body;
    }
    return opts;
  }

  const toastEl = qs('#toast');
  function toast(msg, ok=true){
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + (ok ? 'success' : 'error');
    setTimeout(()=> toastEl.classList.remove('show'), 2600);
  }

  qs('#loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();

    const email = (qs('#email').value || '').trim();
    const password = qs('#password').value || '';
    const btn = qs('#loginBtn');

    if(!email || !password){
      toast('المرجو إدخال المعلومات كاملة', false);
      return;
    }

    btn.disabled = true;
    btn.textContent = 'جاري الدخول...';

    try{
      const res = await fetch('/api/auth/login', apiOpts('POST', { email, password }));
      const data = await res.json().catch(()=> ({}));

      if(!res.ok){
        throw new Error(data?.message || data?.error || 'LOGIN_FAILED');
      }

      toast('تم تسجيل الدخول ✅', true);
      setTimeout(()=>{
        window.location.href = '/profile';
      }, 700);
    }catch(err){
      console.error(err);
      toast('فشل تسجيل الدخول ❌', false);
    }finally{
      btn.disabled = false;
      btn.textContent = 'تسجيل الدخول';
    }
  });
</script>

</body>
</html>
