<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>بروفايل — Le Marché</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#071024;
  color:#e6eef8;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.04);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:14px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0c162c;
  color:white;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn-primary{
  background:#2ea3ff;
  color:white;
}

.btn-danger{
  background:#ef4444;
  color:white;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:12px;
  background:#2ea3ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
  overflow:hidden;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.ad{
  background:#0c162c;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div id="msg"></div>

<div class="card">
  <h2>معلومات الحساب</h2>

  <div class="avatar" id="avatarBox">
    <span id="avatarLetter">U</span>
    <img id="avatarImg" style="display:none">
  </div>
  <input type="file" id="avatarInput" style="display:none" accept="image/*">

  <label>الاسم</label>
  <input id="nameInput" readonly>

  <label>البريد</label>
  <input id="emailInput" readonly>

  <label>الهاتف</label>
  <input id="phoneInput">

  <button class="btn-primary" id="saveBtn">حفظ التغييرات</button>
</div>

<div class="card">
  <h2>تغيير كلمة السر</h2>

  <label>كلمة السر الحالية</label>
  <input type="password" id="currentPwd">

  <label>كلمة السر الجديدة</label>
  <input type="password" id="newPwd">

  <label>تأكيد كلمة السر</label>
  <input type="password" id="confirmPwd">

  <button class="btn-primary" id="changePwdBtn">تغيير كلمة السر</button>
</div>

<div class="card">
  <h2>إعلاناتي</h2>
  <div id="adsContainer"></div>
</div>

<button class="btn-danger" id="logoutBtn">تسجيل الخروج</button>

</div>

<script>
const qs = s => document.querySelector(s);

function showMsg(t){
  qs('#msg').textContent = t;
  setTimeout(()=> qs('#msg').textContent='',3000);
}

async function requireAuth(){
  const res = await fetch('/api/auth/me',{credentials:'include'});
  if(!res.ok){
    location.href='/login';
    return null;
  }
  return await res.json();
}

let currentUser=null;

async function loadProfile(){
  const u = await requireAuth();
  if(!u) return;
  currentUser=u;

  qs('#nameInput').value=u.name||'';
  qs('#emailInput').value=u.email||'';
  qs('#phoneInput').value=u.phone||'';

  qs('#avatarLetter').textContent=(u.name||'U')[0];

  if(u.avatar){
    qs('#avatarImg').src=u.avatar;
    qs('#avatarImg').style.display='block';
    qs('#avatarLetter').style.display='none';
  }

  loadAds();
}

async function loadAds(){
  const res = await fetch('/api/my/ads',{credentials:'include'});
  if(!res.ok) return;

  const ads = await res.json();
  const container=qs('#adsContainer');
  container.innerHTML='';

  if(!ads.length){
    container.innerHTML='<p>لا توجد إعلانات</p>';
    return;
  }

  ads.forEach(ad=>{
    const div=document.createElement('div');
    div.className='ad';
    div.innerHTML=`
      <b>${ad.title}</b><br>
      ${ad.price} د.م<br>
      <button onclick="deleteAd('${ad.id}')">حذف</button>
    `;
    container.appendChild(div);
  });
}

async function deleteAd(id){
  if(!confirm('حذف الإعلان؟')) return;
  const res = await fetch('/api/ads/'+id,{method:'DELETE',credentials:'include'});
  if(res.ok){
    showMsg('تم الحذف');
    loadAds();
  }
}

qs('#saveBtn').onclick=async ()=>{
  if(!currentUser) return;
  const res=await fetch('/api/users/'+currentUser.id,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    credentials:'include',
    body:JSON.stringify({phone:qs('#phoneInput').value})
  });

  if(res.ok){
    showMsg('تم الحفظ');
  }else{
    showMsg('فشل الحفظ');
  }
};

qs('#changePwdBtn').onclick=async ()=>{
  if(qs('#newPwd').value!==qs('#confirmPwd').value){
    showMsg('كلمة السر غير متطابقة');
    return;
  }

  const res=await fetch('/api/auth/password',{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    credentials:'include',
    body:JSON.stringify({
      currentPassword:qs('#currentPwd').value,
      newPassword:qs('#newPwd').value
    })
  });

  if(res.ok){
    showMsg('تم تغيير كلمة السر');
    qs('#currentPwd').value='';
    qs('#newPwd').value='';
    qs('#confirmPwd').value='';
  }else{
    showMsg('فشل تغيير كلمة السر');
  }
};

qs('#avatarBox').onclick=()=> qs('#avatarInput').click();

qs('#avatarInput').addEventListener('change',async e=>{
  if(!currentUser) return;
  const file=e.target.files[0];
  if(!file) return;

  const fd=new FormData();
  fd.append('avatar',file);

  const res=await fetch('/api/users/'+currentUser.id+'/avatar',{
    method:'PUT',
    body:fd,
    credentials:'include'
  });

  if(res.ok){
    const data=await res.json();
    qs('#avatarImg').src=data.avatar;
    qs('#avatarImg').style.display='block';
    qs('#avatarLetter').style.display='none';
    showMsg('تم تحديث الصورة');
  }else{
    showMsg('فشل رفع الصورة');
  }
});

qs('#logoutBtn').onclick=async ()=>{
  await fetch('/api/auth/logout',{method:'POST',credentials:'include'});
  location.href='/login';
};

document.addEventListener('DOMContentLoaded',loadProfile);
</script>

</body>
</html>
