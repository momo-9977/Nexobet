<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>البروفايل - سمسار</title>

<style>
  :root{
    --bg-0:#071024;
    --bg-1:#081426;
    --card-bg:rgba(255,255,255,0.04);
    --card-border:rgba(255,255,255,0.08);
    --text:#e6eef8;
    --muted:#9aa8c2;
    --accent:#2ea3ff;
    --accent-2:#60a5fa;
    --success:#34d399;
    --danger:#ef4444;
    --shadow:0 18px 45px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family: Inter, Arial, sans-serif;
    background: radial-gradient(circle at 10% 10%, rgba(46,163,255,0.10), transparent 20%),
                linear-gradient(180deg,var(--bg-0),var(--bg-1));
    color:var(--text);
    padding-bottom:100px;
  }

  .page{max-width:600px; margin:20px auto; padding:16px}

  /* Header Style */
  .profile-header{
    display:flex; align-items:center; gap:18px; padding:20px;
    border-radius:24px; background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.09); margin-bottom: 25px;
  }
  .avatar{
    width:85px; height:85px; border-radius:50%; /* دائرية بريميوم */
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-size:30px; font-weight:900; color:#fff;
    overflow:hidden; cursor:pointer; border:2px solid var(--accent);
  }
  .avatar img{width:100%; height:100%; object-fit:cover;}
  
  .u-meta h1{ margin:0; font-size:19px; font-weight:800; }
  .u-meta p{ margin:4px 0 0; color:var(--muted); font-size:13px; }

  /* Tiles - قائمة واحدة مرتبة أسفل بعضها */
  .tiles{ display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
  
  .tile{
    border-radius:18px; padding:16px;
    background: rgba(255,255,255,0.03);
    border:1px solid var(--card-border);
    cursor:pointer; transition:0.2s ease;
    display:flex; align-items:center; gap:15px;
    text-decoration:none; color:inherit;
  }
  .tile:active{ transform: scale(0.97); background: rgba(255,255,255,0.06); }
  .tile.active{ border-color: var(--accent); background: rgba(46,163,255,0.08); }

  .tile-icon{
    width:48px; height:48px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; flex-shrink:0; background: rgba(255,255,255,0.05);
  }
  .tile-text h3{ margin:0; font-size:15px; font-weight:700; }
  .tile-text p{ margin:3px 0 0; font-size:12px; color:var(--muted); }

  /* Panels Styling */
  .panel{ display:none; animation: fadeIn 0.3s ease; }
  .panel.active{ display:block; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

  .card{
    background:var(--card-bg); border:1px solid var(--card-border);
    border-radius:20px; padding:20px; margin-top: 15px;
  }

  /* Forms */
  label{ display:block; margin-bottom:8px; font-size:13px; color:var(--muted); }
  input, select, textarea{
    width:100%; padding:12px; border-radius:12px; margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03);
    color:white; outline:none; font-size:14px;
  }

  .btn{
    width:100%; padding:14px; border-radius:14px; border:none;
    font-weight:800; cursor:pointer; transition:0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn.primary{ background:var(--accent); color:white; }
  .btn.danger{ background:var(--danger); color:white; margin-top: 15px; }

  /* Bottom Navigation - التوحيد مع بقية الصفحات */
  .modern-flat-nav{
    position:fixed; bottom:0; left:0; right:0; height:75px;
    background:#ffffff; border-top:1px solid #e5e7eb;
    display:flex; justify-content:space-around; align-items:center; z-index:999;
  }
  .modern-flat-item{
    flex:1; text-align:center; text-decoration:none; color:#6b7280;
    font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .modern-flat-item.active{ color:#16a34a; }
  .modern-flat-nav svg{ width:22px; height:22px; }

  .dot{ width:8px; height:8px; background:var(--danger); border-radius:50%; display:none; margin-right:auto; }
  .dot.show{ display:block; }
</style>
</head>

<body>
<div class="page">

  <section class="profile-header">
    <div class="avatar" id="avatarBox">
      <span id="avatarLetter">U</span>
      <img id="avatarImg" style="display:none">
    </div>
    <div class="u-meta">
      <h1 id="userNameMini">جاري التحميل...</h1>
      <p id="userEmailMini">...</p>
    </div>
    <input id="avatarInput" type="file" accept="image/*" style="display:none" />
  </section>

  <section class="tiles">
    <div class="tile active" data-tab="account">
      <div class="tile-icon" style="color:#0ea5e9">👤</div>
      <div class="tile-text"><h3>حسابي</h3><p>تعديل الهاتف وصورة البروفايل</p></div>
    </div>

    <div class="tile" data-tab="myads">
      <div class="tile-icon" style="color:#8b5cf6">🧾</div>
      <div class="tile-text"><h3>إعلاناتي</h3><p>إدارة وتعديل إعلاناتك</p></div>
    </div>

    <a href="/post-ad" class="tile">
      <div class="tile-icon" style="color:#10b981">➕</div>
      <div class="tile-text"><h3>نشر إعلان</h3><p>أضف إعلانك الجديد الآن</p></div>
    </a>

    <div class="tile" data-tab="password">
      <div class="tile-icon" style="color:#f59e0b">🔒</div>
      <div class="tile-text"><h3>تغيير كلمة السر</h3><p>تحديث أمان حسابك</p></div>
    </div>

    <div class="tile" data-tab="notifications">
      <div class="tile-icon" style="color:#ec4899">🔔</div>
      <div class="tile-text"><h3>الإشعارات</h3><p>آخر التنبيهات والرسائل</p></div>
      <div class="dot" id="notifDot"></div>
    </div>
  </section>

  <div class="panel-wrap">
    
    <div class="card panel active" id="panel-account">
      <label>رقم الهاتف</label>
      <input id="phoneInput" placeholder="06XXXXXXXX">
      <button class="btn primary" id="saveAccountBtn">حفظ التغييرات</button>
    </div>

    <div class="card panel" id="panel-myads">
      <div id="myAdsList">جاري تحميل إعلاناتك...</div>
    </div>

    <div class="card panel" id="panel-password">
      <label>كلمة السر الحالية</label>
      <input id="currentPwd" type="password">
      <label>كلمة السر الجديدة</label>
      <input id="newPwd" type="password">
      <button class="btn primary" id="changePwdBtn">تحديث كلمة السر</button>
    </div>

    <div class="card panel" id="panel-notifications">
      <div id="notifList">لا توجد إشعارات حالياً.</div>
    </div>

  </div>

  <button class="btn danger" id="logoutBtn">🚪 تسجيل الخروج</button>

</div>

<nav class="modern-flat-nav">
  <a href="/" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
    <span>الرئيسية</span>
  </a>
  <a href="/categories" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
    <span>الأقسام</span>
  </a>
  <a href="/post-ad" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    <span>نشر</span>
  </a>
  <a href="/profile" class="modern-flat-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    <span>بروفايل</span>
  </a>
</nav>

<script>
  // نستخدم نفس منطق الـ JavaScript الخاص بك دون أي تغيير في السيرفر
  const qs = (s) => document.querySelector(s);
  const qsa = (s) => document.querySelectorAll(s);

  // تبديل التبويبات (Panels)
  qsa('.tile[data-tab]').forEach(tile => {
    tile.addEventListener('click', () => {
      qsa('.tile').forEach(t => t.classList.remove('active'));
      qsa('.panel').forEach(p => p.classList.remove('active'));
      tile.classList.add('active');
      qs('#panel-' + tile.dataset.tab).classList.add('active');
    });
  });

  // دوال السيرفر الأصلية
  async function loadProfile(){
    try {
      const res = await fetch('/api/auth/me', { credentials:'include' });
      if(!res.ok) return window.location.href = '/login';
      const u = await res.json();
      qs('#userNameMini').textContent = u.name;
      qs('#userEmailMini').textContent = u.email;
      qs('#phoneInput').value = u.phone || '';
      if(u.avatar) {
        qs('#avatarImg').src = u.avatar;
        qs('#avatarImg').style.display = 'block';
        qs('#avatarLetter').style.display = 'none';
      }
    } catch(e) {}
  }

  qs('#logoutBtn').addEventListener('click', async ()=>{
    await fetch('/api/auth/logout', { method:'POST', credentials:'include' });
    window.location.href = '/login';
  });

  // تشغيل عند التحميل
  document.getElementById('avatarBox').addEventListener('click', () => document.getElementById('avatarInput').click());
  loadProfile();
</script>

</body>
</html>
