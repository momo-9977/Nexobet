<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
<title>سمسار - البروفايل</title>

<style>
  :root{
    --bg-main:#0a0f1d;
    --card-bg:#161e2d;
    --card-border:rgba(255,255,255,0.06);
    --text-white:#ffffff;
    --text-muted:#94a3b8;
    --accent:#3b82f6;
    --success:#10b981;
    --premium:#fbbf24;
    --glass:rgba(255, 255, 255, 0.03);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg-main);
    color:var(--text-white);
    padding-bottom:100px;
  }

  .page{max-width:550px; margin:0 auto; padding:15px;}

  /* Profile Header */
  .profile-hero {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(0,0,0,0));
    padding: 30px 20px; border-radius: 24px; border: 1px solid var(--card-border);
    display: flex; flex-direction: column; align-items: center; text-align: center;
    margin-bottom: 25px; position: relative; overflow: hidden;
  }
  .profile-hero::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
  }

  .avatar-container {
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid var(--accent); padding: 3px; position: relative;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); margin-bottom: 15px;
  }
  .avatar-circle {
    width: 100%; height: 100%; border-radius: 50%; background: var(--card-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 800; color: white; overflow: hidden;
  }
  .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
  
  .user-info h1 { margin: 0; font-size: 20px; font-weight: 800; }
  .user-info p { margin: 5px 0 0; color: var(--text-muted); font-size: 13px; }

  /* Premium Tiles Grid */
  .tiles-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .action-tile {
    background: var(--card-bg); border: 1px solid var(--card-border);
    padding: 18px; border-radius: 20px; display: flex; flex-direction: column;
    align-items: center; text-align: center; cursor: pointer; transition: 0.3s;
    text-decoration: none; color: inherit;
  }
  .action-tile:active { transform: scale(0.95); background: rgba(59,130,246,0.05); }
  .tile-icon {
    width: 45px; height: 45px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 12px;
  }
  .action-tile h3 { margin: 0; font-size: 14px; font-weight: 700; }

  /* Icon Colors */
  .bg-blue { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
  .bg-purple { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
  .bg-green { background: rgba(16, 185, 129, 0.15); color: #34d399; }
  .bg-gold { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
  .bg-red { background: rgba(239, 68, 68, 0.15); color: #f87171; }

  /* Floating Sheets (Modals) */
  .modal-sheet {
    position: fixed; top: 100%; left: 0; right: 0; height: 85vh;
    background: #111827; border-top-left-radius: 30px; border-top-right-radius: 30px;
    z-index: 10000; padding: 20px; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5); overflow-y: auto;
    border-top: 1px solid var(--card-border);
  }
  .modal-sheet.active { transform: translateY(-85vh); }
  .sheet-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; position: sticky; top: 0; background: #111827; padding: 10px 0; z-index: 10;
  }
  .close-sheet {
    width: 35px; height: 35px; border-radius: 50%; background: var(--glass);
    display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer;
  }

  /* Form & List Elements */
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .input-box {
    width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border);
    padding: 12px 15px; border-radius: 12px; color: white; outline: none;
  }
  .save-btn {
    width: 100%; background: var(--accent); color: white; border: none;
    padding: 14px; border-radius: 14px; font-weight: 800; margin-top: 10px; cursor: pointer;
  }

  /* List Items */
  .list-item {
    background: var(--glass); border: 1px solid var(--card-border);
    border-radius: 15px; padding: 15px; margin-bottom: 10px;
  }
  .item-row { display: flex; justify-content: space-between; align-items: center; }
  .pill-status { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: bold; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
    background: #ffffff; display: flex; align-items: center;
    justify-content: space-around; z-index: 999; border-top: 1px solid #eee;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-link {
    display: flex; flex-direction: column; align-items: center;
    text-decoration: none; color: #94a3b8; font-size: 11px; font-weight: 600; gap:4px;
  }
  .nav-link.active { color: #16a34a; }
  .nav-link svg { width: 22px; height: 22px; }

  .dot-notif {
    position: absolute; top: 18px; right: 18px; width: 10px; height: 10px;
    background: var(--danger); border-radius: 50%; border: 2px solid var(--card-bg); display: none;
  }

  /* Toast */
  .toast-msg {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #10b981; color: white; padding: 10px 20px; border-radius: 10px;
    font-weight: bold; z-index: 20000; display: none;
  }
</style>
</head>

<body>

<div class="page">
  <div class="profile-hero">
    <div class="avatar-container" onclick="document.getElementById('avatarInput').click()">
      <div class="avatar-circle">
        <span id="avatarLetter">U</span>
        <img id="avatarImg" style="display:none">
      </div>
    </div>
    <div class="user-info">
      <h1 id="userName">...</h1>
      <p id="userEmail">...</p>
    </div>
    <input id="avatarInput" type="file" accept="image/*" style="display:none" />
  </div>

  <div class="tiles-grid">
    <div class="action-tile" onclick="toggleSheet('sheetAccount')">
      <div class="tile-icon bg-blue">👤</div>
      <h3>حسابي</h3>
    </div>

    <div class="action-tile" onclick="toggleSheet('sheetAds')">
      <div class="tile-icon bg-purple">🧾</div>
      <h3>إعلاناتي</h3>
    </div>

    <a href="/post-ad" class="action-tile">
      <div class="tile-icon bg-green">➕</div>
      <h3>نشر إعلان</h3>
    </a>

    <div class="action-tile" onclick="toggleSheet('sheetPassword')">
      <div class="tile-icon bg-gold">🔒</div>
      <h3>كلمة السر</h3>
    </div>

    <div class="action-tile" onclick="toggleSheet('sheetPremium')">
      <div class="tile-icon bg-gold">⭐</div>
      <h3>بروميوم</h3>
    </div>

    <div class="action-tile" onclick="toggleSheet('sheetNotif')">
      <div class="dot-notif" id="notifDot"></div>
      <div class="tile-icon bg-red">🔔</div>
      <h3>الإشعارات</h3>
    </div>
  </div>

  <button class="save-btn" style="background:#ef4444; margin-top:30px" onclick="logout()">تسجيل الخروج</button>
</div>

<div class="modal-sheet" id="sheetAccount">
  <div class="sheet-header">
    <h3>إعدادات الحساب</h3>
    <div class="close-sheet" onclick="toggleSheet('sheetAccount')">✕</div>
  </div>
  <div class="form-group">
    <label>الاسم الكامل</label>
    <input class="input-box" id="nameIn" readonly>
  </div>
  <div class="form-group">
    <label>البريد الإلكتروني</label>
    <input class="input-box" id="emailIn" readonly>
  </div>
  <div class="form-group">
    <label>رقم الهاتف</label>
    <input class="input-box" id="phoneIn" placeholder="06XXXXXXXX">
  </div>
  <button class="save-btn" onclick="updateProfile()">حفظ التغييرات</button>
</div>

<div class="modal-sheet" id="sheetAds">
  <div class="sheet-header">
    <h3>إعلاناتي المسجلة</h3>
    <div class="close-sheet" onclick="toggleSheet('sheetAds')">✕</div>
  </div>
  <div id="myAdsContainer"></div>
</div>

<div class="modal-sheet" id="sheetPassword">
  <div class="sheet-header">
    <h3>تغيير كلمة المرور</h3>
    <div class="close-sheet" onclick="toggleSheet('sheetPassword')">✕</div>
  </div>
  <div class="form-group">
    <label>كلمة السر الحالية</label>
    <input type="password" class="input-box" id="curPwd">
  </div>
  <div class="form-group">
    <label>كلمة السر الجديدة</label>
    <input type="password" class="input-box" id="newPwd">
  </div>
  <button class="save-btn" onclick="changePass()">تحديث الآن</button>
</div>

<div class="modal-sheet" id="sheetPremium">
  <div class="sheet-header">
    <h3>ترقية الإعلانات</h3>
    <div class="close-sheet" onclick="toggleSheet('sheetPremium')">✕</div>
  </div>
  <div class="list-item" style="border-color:var(--premium)">
    <div class="item-row">
      <strong>خطة الـ 7 أيام</strong>
      <span>79 درهم</span>
    </div>
    <button class="save-btn" style="background:var(--premium); color:black" onclick="window.open('https://wa.me/212778594654?text=بروميوم')">تفعيل عبر واتساب</button>
  </div>
</div>

<div class="modal-sheet" id="sheetNotif">
  <div class="sheet-header">
    <h3>مركز التنبيهات</h3>
    <div class="close-sheet" onclick="toggleSheet('sheetNotif')">✕</div>
  </div>
  <div id="notifContainer"></div>
</div>

<nav class="bottom-nav">
  <a href="/" class="nav-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
    <span>الرئيسية</span>
  </a>
  <a href="/categories" class="nav-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
    <span>الأقسام</span>
  </a>
  <a href="/post-ad" class="nav-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    <span>نشر</span>
  </a>
  <a href="/profile" class="nav-link active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    <span>بروفايل</span>
  </a>
</nav>

<div class="toast-msg" id="toast">تمت العملية بنجاح!</div>

<script>
  let userData = null;

  // فتح وإغلاق النوافذ المنبثقة
  function toggleSheet(id) {
    document.getElementById(id).classList.toggle('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  // الحفاظ على منطق السيرفر الأصلي
  async function loadUser() {
    try {
      const res = await fetch('/api/auth/me', { credentials:'include' });
      if(!res.ok) return window.location.href = '/login';
      userData = await res.json();
      
      document.getElementById('userName').textContent = userData.name;
      document.getElementById('userEmail').textContent = userData.email;
      document.getElementById('nameIn').value = userData.name;
      document.getElementById('emailIn').value = userData.email;
      document.getElementById('phoneIn').value = userData.phone || '';
      
      if(userData.avatar) {
        document.getElementById('avatarImg').src = userData.avatar;
        document.getElementById('avatarImg').style.display = 'block';
        document.getElementById('avatarLetter').style.display = 'none';
      }
      
      loadAds();
      loadNotifs();
    } catch(e) {}
  }

  async function updateProfile() {
    const phone = document.getElementById('phoneIn').value;
    const res = await fetch('/api/users/' + userData.id, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ phone }),
      credentials: 'include'
    });
    if(res.ok) {
      showToast('تم تحديث الهاتف بنجاح');
      toggleSheet('sheetAccount');
    }
  }

  async function loadAds() {
    const res = await fetch('/api/my/ads', { credentials:'include' });
    const ads = await res.json();
    const container = document.getElementById('myAdsContainer');
    container.innerHTML = ads.map(ad => `
      <div class="list-item">
        <div class="item-row">
          <strong>${ad.title}</strong>
          <span class="pill-status" style="background:#3b82f620; color:#3b82f6">${ad.price} د.م</span>
        </div>
        <div style="margin-top:10px">
          <button onclick="location.href='/edit-ad?id=${ad.id}'" style="border:none; background:none; color:var(--accent); font-size:12px; margin-left:15px">تعديل</button>
          <button onclick="deleteAd('${ad.id}')" style="border:none; background:none; color:#ef4444; font-size:12px">حذف</button>
        </div>
      </div>
    `).join('');
  }

  async function loadNotifs() {
    const res = await fetch('/api/notifications', { credentials:'include' });
    const list = await res.json();
    if(list.some(n => !n.read)) document.getElementById('notifDot').style.display = 'block';
    document.getElementById('notifContainer').innerHTML = list.map(n => `
      <div class="list-item" style="opacity:${n.read ? 0.6 : 1}">
        <p style="margin:0; font-size:14px">${n.title}</p>
        <span style="font-size:10px; color:var(--text-muted)">${new Date(n.createdAt).toLocaleDateString()}</span>
      </div>
    `).join('');
  }

  async function logout() {
    await fetch('/api/auth/logout', { method:'POST', credentials:'include' });
    window.location.href = '/login';
  }

  loadUser();
</script>
</body>
</html>
