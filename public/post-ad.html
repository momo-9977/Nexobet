<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Samsar - نشر إعلان</title>

<style>
/* نفس التنسيق السابق بدون تغيير النافيكاسيون */

:root{
  --bg-0:#071024;
  --bg-1:#081426;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.05);
  --text:#e6eef8;
  --accent:#2ea3ff;
  --danger:#ef4444;
  --success:#34d399;
}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg-0),var(--bg-1));
  color:var(--text);
  padding-bottom:90px;
}

.container{
  max-width:900px;
  margin:80px auto;
  padding:20px;
}

.card{
  background:var(--card-bg);
  padding:25px;
  border-radius:18px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,.05);
  color:white;
}

.preview-grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.image-box{
  position:relative;
}

.image-box img{
  width:90px;
  height:90px;
  border-radius:10px;
  object-fit:cover;
}

.remove-btn{
  position:absolute;
  top:-6px;
  left:-6px;
  background:red;
  color:white;
  width:20px;
  height:20px;
  border-radius:50%;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.progress{
  height:6px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

.progress span{
  display:block;
  height:100%;
  width:0%;
  background:var(--accent);
}

button{
  background:var(--accent);
  color:white;
  padding:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--success);
  padding:12px 20px;
  border-radius:10px;
  display:none;
}
/* ================= NAV (UNCHANGED) ================= */

.modern-flat-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:999;
}

.modern-flat-item{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:#6b7280;
  font-size:12px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.modern-flat-nav svg{
  width:22px !important;
  height:22px !important;
}

.modern-flat-item.active{
  color:#16a34a;
}

@media(max-width:700px){
  .hero{height:240px}
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>نشر إعلان جديد</h2>

<form id="postForm">

<input type="hidden" id="csrf">

<label>العنوان</label>
<input id="title" required>

<label>الوصف</label>
<textarea id="description" required></textarea>

<label>الثمن</label>
<input type="number" id="price" min="0" required>

<label>المدينة</label>
<input list="cities" id="city" placeholder="ابحث عن المدينة..." required>
<datalist id="cities"></datalist>

<label>التصنيف</label>
<select id="category" required></select>

<label>الصور (حد أقصى 6)</label>
<input type="file" id="images" multiple accept="image/*">
<div class="preview-grid" id="imagePreview"></div>

<label>الفيديو (حد أقصى 1GB)</label>
<input type="file" id="video" accept="video/*">
<video id="videoPreview" controls style="display:none;width:200px"></video>

<div class="progress"><span id="progressBar"></span></div>

<button type="submit" id="submitBtn">نشر الإعلان</button>

</form>

</div>
</div>

<div class="toast" id="toast">تم نشر الإعلان بنجاح ✔</div>
<!-- NAVIGATION (UNCHANGED) -->
<nav class="modern-flat-nav">

  <a href="/" class="modern-flat-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-4v-6H8v6H4a1 1 0 0 1-1-1v-9.5z"/>
    </svg>
    <span>الرئيسية</span>
  </a>

  <a href="/categories" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M3 6h7v7H3V6zm11 0h7v7h-7V6zM3 15h7v7H3v-7zm11 0h7v7h-7v-7z"/>
    </svg>
    <span>الأقسام</span>
  </a>

  <a href="/post-ad" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span>نشر</span>
  </a>

  <a href="/profile" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="7" r="3"/>
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    </svg>
    <span>بروفايل</span>
  </a>
</nav>

<script>
const MAX_IMAGES = 6;
const MAX_VIDEO = 1024 * 1024 * 1024;

async function loadInitialData(){
  const citiesRes = await fetch('/api/cities');
  const cities = await citiesRes.json();
  const datalist = document.getElementById('cities');
  cities.forEach(c=>{
    const option=document.createElement('option');
    option.value=c.name;
    datalist.appendChild(option);
  });

  const catRes = await fetch('/api/categories');
  const cats = await catRes.json();
  const select = document.getElementById('category');
  select.innerHTML='<option value="">اختر التصنيف</option>';
  cats.forEach(cat=>{
    if(cat.active){
      const opt=document.createElement('option');
      opt.value=cat.id;
      opt.textContent=cat.name;
      select.appendChild(opt);
    }
  });
}

loadInitialData();

/* IMAGE PREVIEW + REMOVE */
document.getElementById('images').addEventListener('change', e=>{
  const files = Array.from(e.target.files);
  if(files.length>MAX_IMAGES){
    alert('الحد الأقصى 6 صور');
    e.target.value='';
    return;
  }

  const preview=document.getElementById('imagePreview');
  preview.innerHTML='';
  files.forEach((file,i)=>{
    const box=document.createElement('div');
    box.className='image-box';
    const img=document.createElement('img');
    img.src=URL.createObjectURL(file);

    const remove=document.createElement('div');
    remove.className='remove-btn';
    remove.textContent='×';
    remove.onclick=()=>{
      files.splice(i,1);
      e.target.value='';
      preview.innerHTML='';
    };

    box.appendChild(img);
    box.appendChild(remove);
    preview.appendChild(box);
  });
});

/* VIDEO */
document.getElementById('video').addEventListener('change', e=>{
  const file=e.target.files[0];
  if(file.size>MAX_VIDEO){
    alert('الفيديو أكبر من 1GB');
    e.target.value='';
    return;
  }
  const video=document.getElementById('videoPreview');
  video.src=URL.createObjectURL(file);
  video.style.display='block';
});

/* SUBMIT */
document.getElementById('postForm').addEventListener('submit', e=>{
  e.preventDefault();

  const formData=new FormData(e.target);
  const xhr=new XMLHttpRequest();
  xhr.open('POST','/api/ads');

  xhr.upload.onprogress=(ev)=>{
    if(ev.lengthComputable){
      const percent=(ev.loaded/ev.total)*100;
      document.getElementById('progressBar').style.width=percent+'%';
    }
  };

  xhr.onload=()=>{
    document.getElementById('toast').style.display='block';
    setTimeout(()=>location.reload(),2000);
  };

  xhr.send(formData);
});
</script>

</body>
</html>
