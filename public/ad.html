<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تفاصيل الإعلان</title>

  <style>
    :root{
      --bg-0:#071024;
      --bg-1:#081426;
      --card-bg:rgba(255,255,255,0.03);
      --card-border:rgba(255,255,255,0.06);
      --text:#e6eef8;
      --muted:#9aa8c2;
      --accent:#2ea3ff;
      --accent-2:#60a5fa;
      --premium:#fbbf24;
      --danger:#ef4444;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Arial,sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(46,163,255,0.08), transparent 20%),
        linear-gradient(180deg,var(--bg-0),var(--bg-1));
      color:var(--text);
      padding-bottom:90px;
    }
    .page{max-width:980px;margin:18px auto;padding:16px}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,0.04);
      border:1px solid var(--card-border);
    }
    .btn{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      transition:.2s;
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{
      border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff;
      font-weight:800;
    }
    .btn.danger{
      background:rgba(239,68,68,.12);
      border:1px solid rgba(239,68,68,.35);
      color:#fecaca;
    }

    .card{
      margin-top:14px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:18px;
      overflow:hidden;
    }

    /* slider */
    .slider{
      position:relative;
      height:320px;
      background:rgba(255,255,255,.04);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .slide{
      position:absolute;
      inset:0;
      opacity:0;
      transition:opacity .35s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
    }
    .slide.active{opacity:1}

    /* ✅ الصور والفيديو كاملين بلا تقطيع */
    .slide img,
    .slide video{
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain;
      display:block;
      border-radius:12px;
      background:#0b1222;
    }

    .slide video{
      width:100%;
      height:100%;
    }

    .slider .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:42px;height:42px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.25);
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      user-select:none;
      z-index:5;
    }
    .slider .prev{left:12px}
    .slider .next{right:12px}
    .dots{
      position:absolute;
      bottom:12px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:8px;
      z-index:5;
    }
    .dots span{
      width:10px;height:10px;border-radius:999px;
      background:rgba(255,255,255,.35);
      cursor:pointer;
    }
    .dots span.active{background:#fff}

    .content{padding:14px}
    .title{margin:0;font-size:20px;line-height:1.3}
    .meta{
      margin-top:6px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      color:var(--muted);
      font-size:13px;
    }
    .price{
      margin-top:10px;
      font-size:20px;
      font-weight:900;
      color:#fff;
    }
    .desc{
      margin-top:12px;
      color:rgba(255,255,255,.86);
      line-height:1.8;
      white-space:pre-wrap;
    }

    .actions{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .note{
      margin-top:10px;
      color:rgba(255,255,255,.65);
      font-size:13px;
    }

    @media(max-width:700px){
      .slider{height:260px}
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <a class="btn" href="/">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-4v-6H8v6H4a1 1 0 0 1-1-1v-9.5z"/>
        </svg>
        الرئيسية
      </a>

      <div style="font-weight:900;">تفاصيل الإعلان</div>

      <button class="btn" onclick="history.back()">
        رجوع
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </div>

    <div class="card" id="card">
      <div class="content" id="statusBox" style="padding:18px;color:rgba(255,255,255,.7)">
        جاري تحميل الإعلان...
      </div>
    </div>

  </div>

<script>
  async function jget(url){
    const res = await fetch(url, { credentials:'include' });
    const data = await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error((data && (data.message || data.error)) || ('HTTP ' + res.status));
    return data;
  }

  function safeText(s){ return String(s || '').trim(); }

  function formatPrice(p){
    const n = Number(p);
    if(Number.isFinite(n)) return n.toLocaleString('fr-MA') + ' د.م';
    return (p ? String(p) + ' د.م' : '');
  }

  function absUrlMaybe(u){
    const v = safeText(u);
    if(!v) return '';
    if(/^https?:\/\//i.test(v) || v.startsWith('data:')) return v;
    return v.startsWith('/') ? v : ('/' + v);
  }

  function getIdFromQuery(){
    const sp = new URLSearchParams(location.search);
    return sp.get('id') || '';
  }

  function normalizePhone(raw){
    let p = String(raw || '').trim();
    if(!p) return '';
    p = p.replace(/[^\d+]/g,'');
    return p;
  }

  function pickVideo(ad){
    return absUrlMaybe(
      ad.video ||
      ad.video_url ||
      ad.videoUrl ||
      ''
    );
  }

  function render(ad){
    const card = document.getElementById('card');

    const title = safeText(ad.title) || '—';
    const price = formatPrice(ad.price);
    const city  = safeText(ad.city) || '';
    const desc  = safeText(ad.description) || '';
    const created = ad.created_at ? new Date(ad.created_at).toLocaleString('fr-MA') : '';

    let media = [];

    // الصور
    if (Array.isArray(ad.images)) {
      media = media.concat(
        ad.images
          .map(x => (typeof x === 'string' ? x : (x && x.url ? x.url : '')))
          .map(absUrlMaybe)
          .filter(Boolean)
          .map(src => ({ type:'image', src }))
      );
    }

    if (!media.length && ad.image) {
      media.push({ type:'image', src: absUrlMaybe(ad.image) });
    }

    // الفيديو
    const videoSrc = pickVideo(ad);
    if (videoSrc) {
      media.push({ type:'video', src: videoSrc });
    }

    // placeholder إلا ما كان لا صورة لا فيديو
    if (!media.length) {
      media.push({
        type:'image',
        src:'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500">
            <rect width="100%" height="100%" fill="#0b1222"/>
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#93a3bf" font-size="26" font-family="Arial">No Media</text>
          </svg>`
        )
      });
    }

    const phone = normalizePhone(
      ad.phone ||
      ad.ownerPhone ||
      (ad.owner && ad.owner.phone) ||
      ad.owner_phone ||
      ''
    );
    const ownerName = safeText(
      ad.ownerName ||
      ad.owner_name ||
      (ad.owner && ad.owner.name) ||
      ''
    );
    const waPhone = phone ? phone.replace(/^\+/, '') : '';

    card.innerHTML = `
      <div class="slider" id="slider">
        ${media.map((item, i)=>`
          <div class="slide ${i===0?'active':''}">
            ${
              item.type === 'video'
                ? `
                  <video controls preload="metadata">
                    <source src="${item.src}">
                    متصفحك لا يدعم تشغيل الفيديو.
                  </video>
                `
                : `
                  <img src="${item.src}" alt="">
                `
            }
          </div>
        `).join('')}

        ${media.length > 1 ? `
          <div class="nav prev" id="prevBtn">‹</div>
          <div class="nav next" id="nextBtn">›</div>
          <div class="dots" id="dots">
            ${media.map((_, i)=>`<span class="${i===0?'active':''}" data-i="${i}"></span>`).join('')}
          </div>
        ` : ``}
      </div>

      <div class="content">
        <h1 class="title">${title}</h1>
        <div class="meta">
          ${city ? `<span>📍 ${city}</span>` : ``}
          ${created ? `<span>🕒 ${created}</span>` : ``}
          ${ownerName ? `<span>👤 ${ownerName}</span>` : ``}
        </div>

        <div class="price">${price}</div>

        ${desc ? `<div class="desc">${desc}</div>` : ``}

        <div class="actions">
          ${phone ? `
            <a class="btn primary" href="tel:${phone}">
              <span>اتصال</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.12.86.3 1.7.54 2.5a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.58-1.06a2 2 0 0 1 2.11-.45c.8.24 1.64.42 2.5.54A2 2 0 0 1 22 16.92z"/>
              </svg>
            </a>

            <a class="btn" target="_blank" rel="noopener" href="https://wa.me/${waPhone}">
              <span>واتساب</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M21 12a9 9 0 0 1-13.5 7.8L3 21l1.2-4.5A9 9 0 1 1 21 12z"/>
              </svg>
            </a>
          ` : `
            <div class="note">⚠️ رقم الهاتف غير متوفر لهذا الإعلان.</div>
          `}
        </div>

        <div class="note"></div>
      </div>
    `;

    // slider logic
    const slides = Array.from(card.querySelectorAll('.slide'));
    if(slides.length <= 1) return;

    const dots = Array.from(card.querySelectorAll('#dots span'));
    let cur = 0;

    const stopOtherVideos = (activeIndex) => {
      slides.forEach((slide, index) => {
        if(index !== activeIndex){
          const video = slide.querySelector('video');
          if(video){
            video.pause();
          }
        }
      });
    };

    const goTo = (i) => {
      slides[cur].classList.remove('active');
      dots[cur].classList.remove('active');
      cur = i;
      slides[cur].classList.add('active');
      dots[cur].classList.add('active');
      stopOtherVideos(cur);
    };

    card.querySelector('#prevBtn').onclick = () => goTo((cur - 1 + slides.length) % slides.length);
    card.querySelector('#nextBtn').onclick = () => goTo((cur + 1) % slides.length);

    dots.forEach(d => {
      d.onclick = () => goTo(parseInt(d.dataset.i, 10));
    });
  }

  (async function init(){
    const id = getIdFromQuery();
    const statusBox = document.getElementById('statusBox');

    if(!id){
      statusBox.textContent = 'الإعلان غير موجود (id ناقص).';
      return;
    }

    try{
      const ad = await jget('/api/ads/' + encodeURIComponent(id));
      render(ad);
    }catch(e){
      statusBox.textContent = 'الإعلان غير موجود';
    }
  })();
</script>

</body>
</html>
