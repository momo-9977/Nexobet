<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<title>الأقسام - سمسار</title>

<style>
  :root{
    --bg-main:#0a0f1d;
    --card-bg:#161e2d;
    --card-border:rgba(255,255,255,0.06);
    --text-white:#ffffff;
    --text-muted:#94a3b8;
    --accent:#3b82f6;
    --accent-light:#60a5fa;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg-main);
    color:var(--text-white);
    padding-bottom:100px;
  }

  /* Top Bar */
  .top-bar{
    position:sticky; top:0; z-index:1000;
    background:rgba(10, 15, 29, 0.8);
    backdrop-filter:blur(15px);
    border-bottom:1px solid var(--card-border);
    padding:12px 18px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .back-btn{
    width:38px; height:38px; border-radius:12px;
    background: rgba(255,255,255,0.05); border:1px solid var(--card-border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:white;
  }
  .top-title{ font-size:17px; font-weight:800; color:white; }

  .page{ max-width:600px; margin:0 auto; padding:15px; }

  /* Category Grid */
  .category-grid{
    display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;
  }
  .cat-card{
    border-radius:20px; overflow:hidden;
    background:var(--card-bg); border:1px solid var(--card-border);
    text-decoration:none; color:inherit; transition:0.2s;
  }
  .cat-card:active{ transform:scale(0.96); }
  .cat-img{ width:100%; height:110px; object-fit:cover; background:rgba(0,0,0,0.2); }
  .cat-body{ padding:12px; text-align:center; }
  .cat-name{ margin:0; font-size:14px; font-weight:800; }

  /* Filter Controls */
  .filter-box{
    background: var(--card-bg); border-radius:20px; padding:15px;
    margin-bottom:20px; border:1px solid var(--card-border);
  }
  .filter-row{ display:flex; gap:8px; margin-top:10px; }
  .input-field{
    flex:1; background:rgba(0,0,0,0.2); border:1px solid var(--card-border);
    padding:10px; border-radius:12px; color:white; font-size:13px; outline:none;
  }
  .input-field:focus{ border-color:var(--accent); }
  .btn-apply{
    background: var(--accent); color:white; border:none; padding:10px 20px;
    border-radius:12px; font-weight:800; cursor:pointer; font-size:13px;
  }

  /* Ads Grid */
  .ads-grid{
    display:grid; grid-template-columns: 1fr 1fr; gap:12px;
  }
  .ad-item{
    background:var(--card-bg); border-radius:18px; overflow:hidden;
    text-decoration:none; color:inherit; border:1px solid var(--card-border);
    position:relative; transition:0.2s;
  }
  .ad-item:active{ transform:scale(0.97); }
  .ad-thumb{ width:100%; height:120px; object-fit:cover; }
  .ad-info{ padding:10px; }
  .ad-name{ font-size:13px; font-weight:700; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ad-val{ font-size:14px; font-weight:900; color:var(--accent-light); margin-top:5px; }

  /* Skeleton Loading */
  .skeleton{
    background: linear-gradient(90deg, #161e2d 25%, #1c263b 50%, #161e2d 75%);
    background-size: 200% 100%; animation: loading 1.5s infinite; border-radius:15px;
  }
  @keyframes loading{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Bottom Navigation (Matched with Homepage) */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
    background: #ffffff; display: flex; align-items: center;
    justify-content: space-around; z-index: 1000; border-top: 1px solid #eee;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-link {
    display: flex; flex-direction: column; align-items: center;
    text-decoration: none; color: #94a3b8; font-size: 11px; font-weight: 600; gap:4px;
  }
  .nav-link.active { color: #16a34a; }
  .nav-link svg { width: 22px; height: 22px; }

  .empty-state{ text-align:center; padding:40px; color:var(--text-muted); font-size:14px; }
</style>
</head>

<body>

<div class="top-bar">
  <div class="back-btn" id="backBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </div>
  <div class="top-title" id="topTitle">الأقسام</div>
  <div style="width:38px;"></div> </div>

<div class="page">

  <section id="catsView">
    <div id="catsGrid" class="category-grid">
      <div class="skeleton" style="height:160px"></div>
      <div class="skeleton" style="height:160px"></div>
    </div>
  </section>

  <section id="adsView" style="display:none;">
    <div class="filter-box">
      <div style="font-size:12px; font-weight:700; color:var(--accent-light); margin-bottom:10px;">تصفية النتائج</div>
      <input id="adsSearch" class="input-field" style="width:100%" placeholder="ابحث عن إعلان محدد..." />
      <div class="filter-row">
        <input id="minPrice" class="input-field" type="number" placeholder="الثمن من" />
        <input id="maxPrice" class="input-field" type="number" placeholder="إلى" />
        <button id="applyFilters" class="btn-apply">تطبيق</button>
      </div>
    </div>

    <div id="adsGrid" class="ads-grid"></div>
  </section>

</div>

<nav class="bottom-nav">
  <a href="/" class="nav-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
    <span>الرئيسية</span>
  </a>
  <a href="/categories" class="nav-link active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
    <span>الأقسام</span>
  </a>
  <a href="/post-ad" class="nav-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    <span>نشر</span>
  </a>
  <a href="/profile" class="nav-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    <span>بروفايل</span>
  </a>
</nav>

<script>
// الدوال المساعدة (بدون تغيير في منطق السيرفر)
function absUrl(u){
  if(!u) return '';
  return /^https?:\/\//i.test(u) || u.startsWith('data:') ? u : (u.startsWith('/') ? u : '/' + u);
}

function formatPrice(p){
  return p ? Number(p).toLocaleString('fr-MA') + ' د.م' : '--';
}

async function jget(url){
  const res = await fetch(url, { credentials:'include' });
  return await res.json();
}

const state = {
  allAds: [],
  selectedCategory: null
};

// تحميل الأقسام
async function loadCategories(){
  const catsGrid = document.getElementById('catsGrid');
  try {
    const cats = await jget('/api/categories');
    catsGrid.innerHTML = cats.map(cat => `
      <a href="#" class="cat-card" onclick="openCategory('${cat.id || cat.key || cat.name}', '${cat.name}')">
        <img src="${absUrl(cat.image_url || cat.image)}" class="cat-img">
        <div class="cat-body">
          <div class="cat-name">${cat.name}</div>
        </div>
      </a>
    `).join('');
  } catch(e) { catsGrid.innerHTML = '<div class="empty-state">حدث خطأ أثناء تحميل الأقسام</div>'; }
}

// فتح قسم محدد وتحميل إعلاناته مع الفلترة
async function openCategory(catId, catName){
  document.getElementById('catsView').style.display = 'none';
  document.getElementById('adsView').style.display = 'block';
  document.getElementById('topTitle').textContent = catName;
  document.getElementById('adsGrid').innerHTML = '<div class="skeleton" style="height:200px; grid-column:span 2"></div>';

  try {
    const ads = await jget('/api/ads?category=' + encodeURIComponent(catId));
    state.allAds = ads;
    renderAds(ads);
  } catch(e) { renderAds([]); }
}

function renderAds(ads){
  const grid = document.getElementById('adsGrid');
  const q = document.getElementById('adsSearch').value.toLowerCase();
  const min = parseFloat(document.getElementById('minPrice').value) || 0;
  const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;

  const filtered = ads.filter(ad => {
    const price = parseFloat(ad.price) || 0;
    const title = (ad.title || '').toLowerCase();
    return title.includes(q) && price >= min && price <= max;
  });

  if(filtered.length === 0){
    grid.innerHTML = '<div class="empty-state" style="grid-column:span 2">لا توجد إعلانات تطابق بحثك</div>';
    return;
  }

  grid.innerHTML = filtered.map(ad => `
    <a href="/ad?id=${ad.id}" class="ad-item">
      <img src="${absUrl(ad.image || (ad.images && ad.images[0]))}" class="ad-thumb">
      <div class="ad-info">
        <div class="ad-name">${ad.title || 'بدون عنوان'}</div>
        <div class="ad-val">${formatPrice(ad.price)}</div>
      </div>
    </a>
  `).join('');
}

// تطبيق الفلترة عند الضغط على زر التحديث
document.getElementById('applyFilters').addEventListener('click', () => {
  renderAds(state.allAds);
});

// العودة للخلف
document.getElementById('backBtn').addEventListener('click', () => {
  if(document.getElementById('adsView').style.display === 'block'){
    document.getElementById('adsView').style.display = 'none';
    document.getElementById('catsView').style.display = 'block';
    document.getElementById('topTitle').textContent = 'الأقسام';
  } else {
    location.href = '/';
  }
});

// البدء
loadCategories();
</script>

</body>
</html>
