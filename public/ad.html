<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>تفاصيل الإعلان</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071024;
  color:#fff;
}

.page{max-width:900px;margin:auto;padding:15px}

/* ===== SLIDER ===== */
.slider{
  position:relative;
  height:320px;
  background:#000;
  border-radius:14px;
  overflow:hidden;
}

.slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:.4s;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slide.active{opacity:1}

/* 🔥 الصور بدون تقطيع */
.slide img,
.slide video{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  border-radius:10px;
}

/* arrows */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:40px;height:40px;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  cursor:pointer;
}

.prev{left:10px}
.next{right:10px}

/* dots */
.dots{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
}

.dots span{
  width:8px;height:8px;
  background:#999;
  border-radius:50%;
  cursor:pointer;
}

.dots span.active{background:#fff}

/* zoom modal */
.zoom{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.zoom img{
  max-width:90%;
  max-height:90%;
}

.content{margin-top:15px}
.title{font-size:20px;font-weight:bold}
.price{margin-top:10px;font-size:18px}
.desc{margin-top:10px;line-height:1.6}
</style>
</head>

<body>

<div class="page">

<div class="slider" id="slider"></div>

<div class="content" id="content"></div>

</div>

<div class="zoom" id="zoomBox" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script>
let index=0;
let slides=[];

/* fetch */
async function jget(url){
  const r = await fetch(url);
  return await r.json();
}

/* helper */
function abs(u){
  if(!u) return '';
  if(u.startsWith('http')) return u;
  return '/' + u.replace(/^\/+/,'');
}

function getId(){
  return new URLSearchParams(location.search).get('id');
}

/* render */
function render(ad){
  const slider=document.getElementById('slider');
  const content=document.getElementById('content');

  let media=[];

  // images
  if(Array.isArray(ad.images)){
    media.push(...ad.images.map(x=>typeof x==='string'?x:x.url));
  }
  if(ad.image) media.push(ad.image);

  // video
  if(ad.video||ad.video_url){
    media.push({video:ad.video||ad.video_url});
  }

  slider.innerHTML = `
    ${media.map((m,i)=>{
      if(typeof m==='object'){
        return `
        <div class="slide ${i==0?'active':''}">
          <video controls>
            <source src="${abs(m.video)}">
          </video>
        </div>`;
      }
      return `
      <div class="slide ${i==0?'active':''}">
        <img src="${abs(m)}" onclick="zoom(this.src)">
      </div>`;
    }).join('')}

    ${media.length>1?`
      <div class="nav prev" onclick="move(-1)">‹</div>
      <div class="nav next" onclick="move(1)">›</div>

      <div class="dots">
        ${media.map((_,i)=>`<span onclick="go(${i})" class="${i==0?'active':''}"></span>`).join('')}
      </div>
    `:''}
  `;

  slides=document.querySelectorAll('.slide');

  content.innerHTML = `
    <div class="title">${ad.title||''}</div>
    <div class="price">${ad.price||''} د.م</div>
    <div class="desc">${ad.description||''}</div>
  `;

  // swipe
  let startX=0;
  slider.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;
  });

  slider.addEventListener('touchend',e=>{
    let endX=e.changedTouches[0].clientX;
    if(startX-endX>50) move(1);
    if(endX-startX>50) move(-1);
  });
}

/* slider controls */
function move(dir){
  slides[index].classList.remove('active');
  index=(index+dir+slides.length)%slides.length;
  slides[index].classList.add('active');
  updateDots();
}

function go(i){
  slides[index].classList.remove('active');
  index=i;
  slides[index].classList.add('active');
  updateDots();
}

function updateDots(){
  document.querySelectorAll('.dots span').forEach((d,i)=>{
    d.classList.toggle('active', i===index);
  });
}

/* zoom */
function zoom(src){
  document.getElementById('zoomImg').src=src;
  document.getElementById('zoomBox').style.display='flex';
}

function closeZoom(){
  document.getElementById('zoomBox').style.display='none';
}

/* init */
(async()=>{
  const id=getId();
  const ad=await jget('/api/ads/'+id);
  render(ad);
})();
</script>

</body>
</html>
