<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Samsar</title>

<style>
:root{
  --bg-0:#071024;
  --bg-1:#081426;
  --card-bg:rgba(255,255,255,0.03);
  --card-border:rgba(255,255,255,0.05);
  --text:#e6eef8;
  --muted:#9aa8c2;
  --accent:#2ea3ff;
  --accent-2:#60a5fa;
  --premium:#fbbf24;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
  radial-gradient(circle at 10% 10%, rgba(46,163,255,0.08), transparent 20%),
  linear-gradient(180deg,var(--bg-0),var(--bg-1));
  color:var(--text);
  padding-bottom:90px;
}

.page{max-width:1200px;margin:20px auto;padding:18px}

/* HEADER */

.home-brand-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-radius:16px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--card-border);
}

.brand-text{
  text-align:left;
}

.brand-text h1{
  margin:0;
  font-size:22px;
}

.brand-text p{
  margin:0;
  font-size:13px;
  color:var(--muted);
}

/* NEW WRAPPER */
.logo-area{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-img{
  width:54px;
  height:54px;
  border-radius:14px;
  background:linear-gradient(135deg,#043b66,#0b7bd6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

/* NEW SUPPORT ICON */
.support-btn{
  width:46px;
  height:46px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.3s;
  text-decoration:none;
}

.support-btn:hover{
  background:rgba(255,255,255,0.12);
  transform:translateY(-3px);
}

.support-btn svg{
  width:22px;
  height:22px;
  stroke:white;
}

/* ===== باقي الكود كما هو تماما ===== */

/* HERO */
.hero{
  margin-top:20px;
  position:relative;
  height:320px;
  border-radius:18px;
  overflow:hidden;
}

.hero-slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity .6s ease;
}

.hero-slide.active{opacity:1}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.5));
}

.hero-dots{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  z-index:5;
}

.hero-dots span{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.4);
  cursor:pointer;
}

.hero-dots span.active{
  background:white;
}

/* SEARCH */

.search-box{
  margin-top:25px;
  display:flex;
  gap:10px;
}

.search-box input{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,.05);
  color:white;
}

.search-box button{
  padding:14px 18px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:white;
  font-weight:700;
}

/* INLINE CATEGORIES */

.inline-categories{
  margin-top:25px;
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

.inline-categories a{
  padding:12px 20px;
  background:rgba(255,255,255,.06);
  border-radius:14px;
  text-decoration:none;
  color:white;
  transition:.3s;
}

.inline-categories a:hover{
  background:rgba(255,255,255,.12);
}

/* SECTIONS */

.section{
  margin-top:35px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.section-header h2{
  margin:0;
  font-size:18px;
}

/* ADS */

.ads-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:18px;
}

.ad-card{
  background:var(--card-bg);
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--card-border);
  transition:.3s;
}

.ad-card:hover{transform:translateY(-6px)}

.ad-image{
  width:100%;
  height:180px;
  object-fit:cover;
}

.ad-content{padding:14px}

.ad-title{font-size:15px;margin:0 0 6px}

.ad-price{font-weight:800}

.premium-badge{
  position:absolute;
  top:10px;
  left:10px;
  background:var(--premium);
  color:black;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  font-weight:700;
}

/* NAV (UNCHANGED) */

.modern-flat-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:999;
}

.modern-flat-item{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:#6b7280;
  font-size:12px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.modern-flat-nav svg{
  width:22px !important;
  height:22px !important;
}

.modern-flat-item.active{
  color:#16a34a;
}
</style>
</head>

<body>

<div class="page">

<header class="home-brand-bar">
  <div class="brand-text">
    <h1>Samsar</h1>
    <p>بيع وشراء بسهولة</p>
  </div>

  <div class="logo-area">
    <div class="logo-img">S</div>

    <!-- NEW SUPPORT ICON -->
    <a href="/support" class="support-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
        <path d="M4 12a8 8 0 0116 0"/>
        <path d="M4 12v4a2 2 0 002 2h2"/>
        <path d="M20 12v4a2 2 0 01-2 2h-2"/>
      </svg>
    </a>
  </div>
</header>
