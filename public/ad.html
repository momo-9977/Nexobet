<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تفاصيل الإعلان</title>

  <style>
    :root{
      --bg-0:#0a1227;
      --bg-1:#0f172a;
      --card-bg:rgba(255,255,255,0.05);
      --card-border:rgba(255,255,255,0.08);
      --text:#f1f5f9;
      --muted:#94a3b8;
      --accent:#3b82f6;
      --accent-2:#0ea5e9;
      --whatsapp:#25D366;
      --price-bg:#1e293b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-0);
      color:var(--text);
      padding-bottom:100px;
      line-height: 1.6;
    }
    .page{max-width:800px;margin:0 auto;padding:16px}

    /* Topbar */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:15px;
      border-radius:20px;
      background:rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border:1px solid var(--card-border);
      margin-bottom: 20px;
    }
    .btn{
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.05);
      color:var(--text);
      padding:8px 16px;
      border-radius:12px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      transition:all 0.3s ease;
      font-size: 14px;
    }
    .btn:active{transform:scale(0.95)}

    /* Card */
    .card{
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:24px;
      overflow:hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* Slider & Swipe */
    .slider{
      position:relative;
      height:380px;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow: hidden;
      touch-action: pan-y; /* يسمح بالتمرير العمودي للمتصفح والأفقي للصور */
    }
    .slide{
      position:absolute;
      inset:0;
      opacity:0;
      transition: opacity .4s cubic-bezier(0.4, 0, 0.2, 1);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .slide.active{opacity:1; z-index: 2;}
    .slide img, .slide video{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .slider .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:40px;height:40px;
      border-radius:50%;
      background:rgba(0,0,0,0.5);
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      z-index:10;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .slider .prev{left:12px}
    .slider .next{right:12px}
    
    .dots{
      position:absolute;
      bottom:15px;
      display:flex;
      gap:6px;
      z-index:10;
    }
    .dots span{
      width:8px;height:8px;border-radius:50%;
      background:rgba(255,255,255,0.3);
      transition: 0.3s;
    }
    .dots span.active{background:#fff; width:20px; border-radius:10px;}

    /* Content Styling */
    .content{padding:20px}
    .title{margin:0;font-size:22px;font-weight:700;color:#fff}
    
    .meta{
      margin-top:10px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      color:var(--muted);
      font-size:13px;
    }

    /* Price Card - New Style */
    .price-tag {
      display: inline-block;
      margin-top: 15px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid var(--accent);
      padding: 10px 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
    }
    .price-value {
      font-size: 22px;
      font-weight: 900;
      color: var(--accent);
    }

    /* Description - New Style */
    .desc-box {
      margin-top: 20px;
      background: rgba(15, 23, 42, 0.5);
      padding: 15px;
      border-radius: 16px;
      border-right: 4px solid var(--accent);
      color: #cbd5e1;
      font-size: 15px;
      white-space: pre-wrap;
    }

    /* Actions & Buttons */
    .actions{
      margin-top: 25px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-call {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      justify-content: center;
      font-weight: 700;
      border: none;
      height: 50px;
    }
    .btn-wa {
      background: #25D366;
      color: white;
      justify-content: center;
      font-weight: 700;
      border: none;
      height: 50px;
    }
    .btn-wa svg { fill: white; }

    @media(max-width:600px){
      .slider{height:300px}
      .actions{grid-template-columns: 1fr;}
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <a class="btn" href="/">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        الرئيسية
      </a>
      <div style="font-weight:700;">تفاصيل الإعلان</div>
      <button class="btn" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        رجوع
      </button>
    </div>

    <div class="card" id="card">
      <div class="content" id="statusBox" style="text-align:center; padding:50px; color:var(--muted)">
        جاري تحميل البيانات الذكية...
      </div>
    </div>
  </div>

<script>
  async function jget(url){
    const res = await fetch(url, { credentials:'include' });
    const data = await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error('خطأ في الاتصال');
    return data;
  }

  function formatPrice(p){
    const n = Number(p);
    return Number.isFinite(n) ? n.toLocaleString('fr-MA') + ' درهم' : (p ? p + ' درهم' : 'غير محدد');
  }

  function absUrlMaybe(u){
    if(!u) return '';
    if(/^https?:\/\//i.test(u) || u.startsWith('data:')) return u;
    return u.startsWith('/') ? u : ('/' + u);
  }

  function render(ad){
    const card = document.getElementById('card');
    
    // تجهيز الميديا
    let media = [];
    if (Array.isArray(ad.images)) {
      media = ad.images.map(x => ({ type:'image', src: absUrlMaybe(typeof x === 'string' ? x : x.url) }));
    } else if (ad.image) {
      media.push({ type:'image', src: absUrlMaybe(ad.image) });
    }
    if (ad.video || ad.video_url) {
      media.push({ type:'video', src: absUrlMaybe(ad.video || ad.video_url) });
    }

    const phone = (ad.phone || (ad.owner && ad.owner.phone) || '').replace(/[^\d+]/g,'');
    const waPhone = phone.replace(/^\+/, '');

    card.innerHTML = `
      <div class="slider" id="mainSlider">
        ${media.map((item, i)=>`
          <div class="slide ${i===0?'active':''}" data-index="${i}">
            ${item.type === 'video' 
              ? `<video controls><source src="${item.src}"></video>` 
              : `<img src="${item.src}" alt="">`}
          </div>
        `).join('')}
        
        ${media.length > 1 ? `
          <div class="nav prev" onclick="changeSlide(-1)">‹</div>
          <div class="nav next" onclick="changeSlide(1)">›</div>
          <div class="dots" id="dotsContainer">
            ${media.map((_, i)=>`<span class="${i===0?'active':''}"></span>`).join('')}
          </div>
        ` : ''}
      </div>

      <div class="content">
        <h1 class="title">${ad.title || 'بدون عنوان'}</h1>
        <div class="meta">
          <span>📍 ${ad.city || 'غير محدد'}</span>
          <span>🕒 ${ad.created_at ? new Date(ad.created_at).toLocaleDateString('ar-MA') : ''}</span>
        </div>

        <div class="price-tag">
          <span class="price-value">${formatPrice(ad.price)}</span>
        </div>

        ${ad.description ? `<div class="desc-box">${ad.description}</div>` : ''}

        <div class="actions">
          ${phone ? `
            <a class="btn btn-call" href="tel:${phone}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.12.86.3 1.7.54 2.5a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.58-1.06a2 2 0 0 1 2.11-.45c.8.24 1.64.42 2.5.54A2 2 0 0 1 22 16.92z"></path></svg>
              إتصال مباشر
            </a>
            <a class="btn btn-wa" target="_blank" href="https://wa.me/${waPhone}">
              <svg width="20" height="20" viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.7-30.6-38.2-3.2-5.6-.3-8.6 2.5-11.3 2.5-2.5 5.5-6.5 8.3-9.7 2.8-3.3 3.7-5.5 5.5-9.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.3 5.7 23.7 9.1 31.7 11.7 13.3 4.2 25.5 3.6 35.2 2.2 10.8-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
              واتساب
            </a>
          ` : '<div class="note">رقم الهاتف غير متاح</div>'}
        </div>
      </div>
    `;

    initSliderLogic(media.length);
  }

  let currentSlide = 0;
  function changeSlide(n) {
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dots span');
    if(slides.length <= 1) return;

    slides[currentSlide].classList.remove('active');
    dots[currentSlide].classList.remove('active');
    
    currentSlide = (currentSlide + n + slides.length) % slides.length;
    
    slides[currentSlide].classList.add('active');
    dots[currentSlide].classList.add('active');
    
    // إيقاف الفيديوهات في السلايدات الأخرى
    slides.forEach((s, i) => {
      const v = s.querySelector('video');
      if(v && i !== currentSlide) v.pause();
    });
  }

  function initSliderLogic(count) {
    if(count <= 1) return;
    const slider = document.getElementById('mainSlider');
    let touchStartX = 0;
    let touchEndX = 0;

    slider.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    slider.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, {passive: true});

    function handleSwipe() {
      const threshold = 50; // الحد الأدنى للمسافة لاعتبارها حركة تمرير
      if (touchStartX - touchEndX > threshold) {
        changeSlide(1); // تمرير لليسار -> التالي
      } else if (touchEndX - touchStartX > threshold) {
        changeSlide(-1); // تمرير لليمين -> السابق
      }
    }
  }

  (async function init(){
    const id = new URLSearchParams(location.search).get('id');
    if(!id) return document.getElementById('statusBox').textContent = 'معرف الإعلان مفقود';
    try{
      const ad = await jget('/api/ads/' + encodeURIComponent(id));
      render(ad);
    }catch(e){
      document.getElementById('statusBox').textContent = 'تعذر تحميل الإعلان';
    }
  })();
</script>

</body>
</html>
