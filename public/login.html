<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Samsar — تسجيل الدخول بريميوم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #6366f1;
    --primary-glow: rgba(99, 102, 241, 0.5);
    --accent: #0ea5e9;
    --premium-gold: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
    --bg-dark: #030712;
    --card-bg: rgba(17, 24, 39, 0.7);
    --border-light: rgba(255, 255, 255, 0.08);
    --text-main: #f9fafb;
    --text-muted: #9ca3af;
  }

  * {
    box-sizing: border-box;
    font-family: 'Tajawal', sans-serif;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--bg-dark);
    background-image: 
      radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
      radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0, transparent 50%);
    color: var(--text-main);
    padding: 24px;
    overflow-x: hidden;
  }

  /* تأثيرات الإضاءة الخلفية */
  body::before {
    content: "";
    position: fixed;
    width: 300px;
    height: 300px;
    background: var(--primary);
    filter: blur(120px);
    border-radius: 50%;
    top: 10%;
    right: 10%;
    opacity: 0.1;
    z-index: -1;
  }

  .login-shell {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
  }

  .login-card {
    background: var(--card-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--border-light);
    border-radius: 32px;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    position: relative;
    overflow: hidden;
  }

  /* خط مضيء علوي */
  .login-card::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  }

  .brand-wrap {
    text-align: center;
    margin-bottom: 35px;
  }

  .brand-badge {
    width: 75px;
    height: 75px;
    background: var(--premium-gold);
    margin: 0 auto 15px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: #000;
    box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
    transform: rotate(-5deg);
  }

  .brand-title {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(to bottom, #fff 0%, #9ca3af 100%);
    -webkit-text-fill-color: transparent;
    margin: 0;
  }

  .form {
    display: grid;
    gap: 20px;
  }

  .field label {
    display: block;
    font-size: 14px;
    margin-bottom: 10px;
    color: var(--text-muted);
    font-weight: 700;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    color: var(--primary);
    opacity: 0.8;
  }

  .form input {
    width: 100%;
    height: 56px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border-light);
    border-radius: 18px;
    padding: 0 50px 0 16px;
    color: #fff;
    font-size: 15px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .form input:focus {
    outline: none;
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--primary);
    box-shadow: 0 0 15px var(--primary-glow);
  }

  .submit-btn {
    height: 58px;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    box-shadow: 0 10px 20px rgba(99, 102, 241, 0.25);
    transition: all 0.3s ease;
    margin-top: 10px;
  }

  .submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
    filter: brightness(1.1);
  }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .form-foot {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--text-muted);
  }

  .form-foot a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 800;
    margin-right: 5px;
  }

  .toast {
    position: fixed;
    left: 50%;
    transform: translate(-50%, 50px);
    bottom: 30px;
    padding: 14px 28px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    color: #fff;
    font-weight: 700;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 100;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .toast.show {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, 0);
  }

  .toast.success { background: rgba(16, 185, 129, 0.9); }
  .toast.error { background: rgba(239, 68, 68, 0.9); }

  @media (max-width: 480px) {
    .login-card { padding: 30px 20px; border-radius: 28px; }
    .brand-title { font-size: 24px; }
  }
</style>
</head>

<body>

  <div class="login-shell">
    <div class="login-card">
      <div class="brand-wrap">
        <div class="brand-badge">S</div>
        <h1 class="brand-title">مرحباً بعودتك</h1>
      </div>

      <form class="form" id="loginForm">
        <div class="field">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input id="email" name="email" type="email" placeholder="name@example.com" autocomplete="email" required />
          </div>
        </div>

        <div class="field">
          <label for="password">كلمة السر</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>
        </div>

        <button class="submit-btn" id="loginBtn" type="submit">تسجيل الدخول</button>

        <div class="form-foot">
          ليس لديك حساب؟ <a href="/register">أنشئ حسابك الآن</a>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  /* تم الحفاظ على المنطق البرمجي كما هو لضمان عمل السيرفر */
  const qs = (s) => document.querySelector(s);

  function apiOpts(method='GET', body=null){
    const opts = { method, credentials:'include', headers:{} };
    if(body && !(body instanceof FormData)){
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }else if(body instanceof FormData){
      opts.body = body;
    }
    return opts;
  }

  const toastEl = qs('#toast');
  function toast(msg, ok=true){
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + (ok ? 'success' : 'error');
    setTimeout(()=> toastEl.classList.remove('show'), 2600);
  }

  qs('#loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();

    const email = (qs('#email').value || '').trim();
    const password = qs('#password').value || '';
    const btn = qs('#loginBtn');

    if(!email || !password){
      toast('المرجو إدخال المعلومات كاملة', false);
      return;
    }

    btn.disabled = true;
    btn.textContent = 'جاري التحقق...';

    try{
      const res = await fetch('/api/auth/login', apiOpts('POST', { email, password }));
      const data = await res.json().catch(()=> ({}));

      if(!res.ok){
        throw new Error(data?.message || data?.error || 'LOGIN_FAILED');
      }

      toast('تم تسجيل الدخول بنجاح ✅', true);
      setTimeout(()=>{
        window.location.href = '/profile';
      }, 700);
    }catch(err){
      console.error(err);
      toast('فشل الدخول، تأكد من البيانات ❌', false);
    }finally{
      btn.disabled = false;
      btn.textContent = 'تسجيل الدخول';
    }
  });
</script>

</body>
</html>
