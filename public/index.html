<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>الرئيسية</title>

<style>
:root{
  --bg-0:#071024;
  --bg-1:#081426;
  --card-bg:rgba(255,255,255,0.03);
  --card-border:rgba(255,255,255,0.05);
  --text:#e6eef8;
  --muted:#9aa8c2;
  --accent:#2ea3ff;
  --accent-2:#60a5fa;
  --premium:#fbbf24;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
  radial-gradient(circle at 10% 10%, rgba(46,163,255,0.08), transparent 20%),
  linear-gradient(180deg,var(--bg-0),var(--bg-1));
  color:var(--text);
  padding-bottom:90px;
}

.page{max-width:1200px;margin:20px auto;padding:18px}

/* ================= HEADER ================= */

.home-brand-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-radius:16px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--card-border);
}

.logo-area{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-img{
  width:54px;
  height:54px;
  border-radius:14px;
  background:linear-gradient(135deg,#043b66,#0b7bd6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  overflow:hidden;
}
.logo-img img{width:100%;height:100%;object-fit:cover;display:block}

.brand-text{ text-align:right; }
.brand-text h1{ margin:0; font-size:20px; }
.brand-text p{ margin:0; font-size:13px; color:var(--muted); }

/* ✅ Premium Support Icon */
.header-actions{ display:flex; align-items:center; gap:10px; }
.support-btn{
  width:44px;height:44px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.04);
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:var(--text);
  position:relative;
  transition:.2s;
}
.support-btn:hover{transform:translateY(-2px); box-shadow:0 14px 28px rgba(0,0,0,.25)}
.support-btn::after{
  content:"Support";
  position:absolute;
  bottom:-18px;
  font-size:11px;
  color:rgba(255,255,255,.65);
  display:none;
}
@media(min-width:900px){ .support-btn::after{display:block} }
.support-btn .badge{
  position:absolute;
  top:-8px;
  left:-8px;
  background:var(--premium);
  color:#111;
  font-weight:900;
  font-size:11px;
  padding:4px 8px;
  border-radius:999px;
  box-shadow:0 12px 24px rgba(251,191,36,.22);
}

/* ================= HERO SLIDER ================= */

.hero{
  margin-top:20px;
  position:relative;
  height:320px;
  border-radius:18px;
  overflow:hidden;
}
.hero-slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity .6s ease;
}
.hero-slide.active{opacity:1}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.5));
  pointer-events:none;
}
.hero-dots{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  z-index:5;
}
.hero-dots span{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,.4);
  cursor:pointer;
}
.hero-dots span.active{ background:#fff; }

/* ================= SEARCH ================= */

.search-box{ margin-top:25px; display:flex; gap:10px; }
.search-box input{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,.05);
  color:white;
}
.search-box button{
  padding:14px 18px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* ================= SECTION ================= */

.section{ margin-top:35px; }
.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}
.section-header h2{ margin:0; font-size:18px; }
.section-header a{ color:var(--accent); text-decoration:none; font-size:14px; }

/* ================= ADS GRID ================= */

.ads-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:18px;
}
.ad-card{
  background:var(--card-bg);
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--card-border);
  transition:.3s;
  text-decoration:none;
  color:inherit;
  display:block;
}
.ad-card:hover{transform:translateY(-6px)}
.ad-image{
  width:100%;
  height:180px;
  object-fit:cover;
  background:rgba(255,255,255,.04);
}
.ad-content{padding:14px}
.ad-title{font-size:15px;margin:0 0 6px}
.ad-price{font-weight:800}

.premium-badge{
  position:absolute;
  top:10px;
  left:10px;
  background:var(--premium);
  color:black;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  font-weight:700;
}

/* ================= CATEGORIES ================= */

.categories{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}
.category{
  background:rgba(255,255,255,.05);
  padding:18px;
  border-radius:16px;
  text-align:center;
  cursor:pointer;
  transition:.3s;
}
.category:hover{ background:rgba(255,255,255,.08); }

/* ================= NAV (UNCHANGED) ================= */

.modern-flat-nav{
  position:fixed;
  bottom:0; left:0; right:0;
  height:70px;
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:999;
}
.modern-flat-item{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:#6b7280;
  font-size:12px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.modern-flat-nav svg{ width:22px !important; height:22px !important; }
.modern-flat-item.active{ color:#16a34a; }

@media(max-width:700px){ .hero{height:240px} }
</style>
</head>

<body>

<div class="page">

<header class="home-brand-bar">
  <div class="logo-area">
    <div class="logo-img" id="logoBox">LM</div>
    <div class="brand-text">
      <h1 id="platformName">Le Marché</h1>
      <p id="platformSubtitle">Vendre et acheter facilement</p>
    </div>
  </div>

  <div class="header-actions">
    <a class="support-btn" href="/support" title="الدعم">
      <span class="badge">★</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
        <path d="M4 12a8 8 0 0 1 16 0"/>
        <path d="M4 12v4a2 2 0 0 0 2 2h2v-6H6a2 2 0 0 0-2 2z"/>
        <path d="M20 12v4a2 2 0 0 1-2 2h-2v-6h2a2 2 0 0 1 2 2z"/>
        <path d="M8 20h8"/>
      </svg>
    </a>
  </div>
</header>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="hero-dots" id="heroDots"></div>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input id="searchInput" placeholder="ابحث عن أي شيء...">
  <button id="searchBtn">بحث</button>
</div>

<!-- FEATURED -->
<div class="section">
  <div class="section-header">
    <h2>إعلانات مميزة</h2>
  </div>
  <div class="ads-grid" id="featuredGrid"></div>
</div>

<!-- LATEST -->
<div class="section">
  <div class="section-header">
    <h2>أحدث الإعلانات</h2>
    <a href="/categories">عرض الكل</a>
  </div>
  <div class="ads-grid" id="latestGrid"></div>
</div>

<!-- CATEGORIES -->
<div class="section">
  <div class="section-header">
    <h2>الأقسام</h2>
  </div>
  <div class="categories" id="catsGrid"></div>
</div>

</div>

<nav class="modern-flat-nav">

  <a href="/" class="modern-flat-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-4v-6H8v6H4a1 1 0 0 1-1-1v-9.5z"/>
    </svg>
    <span>الرئيسية</span>
  </a>

  <a href="/categories" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M3 6h7v7H3V6zm11 0h7v7h-7V6zM3 15h7v7H3v-7zm11 0h7v7h-7v-7z"/>
    </svg>
    <span>الأقسام</span>
  </a>

  <a href="/post-ad" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span>نشر</span>
  </a>

  <a href="/profile" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="7" r="3"/>
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    </svg>
    <span>بروفايل</span>
  </a>

</nav>

<script>
/* ===========================
   helpers
=========================== */
async function jget(url){
  const res = await fetch(url, { credentials:'include' });
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw new Error((data && (data.message || data.error)) || ('HTTP ' + res.status));
  return data;
}
function safeText(s){ return String(s || '').trim(); }
function formatPrice(p){
  const n = Number(p);
  if(Number.isFinite(n)) return n.toLocaleString('fr-MA') + ' د.م';
  return (p ? String(p) + ' د.م' : '');
}
function absUrlMaybe(u){
  const v = safeText(u);
  if(!v) return '';
  // already absolute or data:
  if(/^https?:\/\//i.test(v) || v.startsWith('data:')) return v;
  // ensure leading slash
  return v.startsWith('/') ? v : ('/' + v);
}

  // ✅ supports many shapes:
  // - { images: ["/uploads/x.jpg"] }
  // - { image: "/uploads/x.jpg" }  (server adds "image" subquery)
  // - { image_url: "..."} / { imageUrl: "..."}
  // - { images: "..." } (rare)
  function firstImage(ad){
  if(ad && ad.image) return ad.image; // ✅ جاي من API
  if(ad && Array.isArray(ad.images) && ad.images.length) return ad.images[0];
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500">
      <rect width="100%" height="100%" fill="#0b1222"/>
      <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#93a3bf" font-size="26" font-family="Arial">No Image</text>
    </svg>`
  );
}
function renderAdCard(ad, showBadge){
  const id = ad.id;
  const img = firstImage(ad);
  const title = safeText(ad.title);
  const price = formatPrice(ad.price);
  const href = '/ad?id=' + encodeURIComponent(id);

  return `
    <a class="ad-card" href="${href}">
      <div style="position:relative">
        <img class="ad-image" src="${img}" alt="">
        ${showBadge ? `<div class="premium-badge">مميز</div>` : ``}
      </div>
      <div class="ad-content">
        <div class="ad-title">${title || '—'}</div>
        <div class="ad-price">${price || ''}</div>
      </div>
    </a>
  `;
}

/* ===========================
   1) Brand
=========================== */
async function loadBrand(){
  try{
    const s = await jget('/api/settings');
    const name = safeText(s.platformName) || 'Le Marché';
    const sub  = safeText(s.subtitle) || 'Vendre et acheter facilement';
    const logo = safeText(s.logoUrl);

    document.getElementById('platformName').textContent = name;
    document.getElementById('platformSubtitle').textContent = sub;

    const logoBox = document.getElementById('logoBox');
    if(logo){
      logoBox.innerHTML = `<img src="${absUrlMaybe(logo)}" alt="logo">`;
    }else{
      logoBox.textContent = (name.split(' ').map(x=>x[0]).join('').slice(0,2) || 'LM').toUpperCase();
    }
  }catch(_){}
}

/* ===========================
   2) Hero slides
   - expects server: GET /api/home/slides -> [{imageUrl, linkUrl, order}]
=========================== */
let heroTimer = null;
function startHero(slides, intervalMs){
  const hero = document.getElementById('hero');
  const dotsWrap = document.getElementById('heroDots');

  hero.querySelectorAll('.hero-slide').forEach(x=>x.remove());
  dotsWrap.innerHTML = '';

  if(!slides.length){
    slides = [{ imageUrl:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop' }];
  }

  slides.forEach((sl, i)=>{
    const d = document.createElement('a');
    d.className = 'hero-slide' + (i===0 ? ' active' : '');
    d.style.backgroundImage = `url('${absUrlMaybe(sl.imageUrl)}')`;
    d.href = sl.linkUrl ? sl.linkUrl : '#';
    d.style.display = 'block';
    d.style.textDecoration = 'none';
    if(!sl.linkUrl) d.style.pointerEvents = 'none';
    hero.insertBefore(d, dotsWrap);

    const dot = document.createElement('span');
    if(i===0) dot.classList.add('active');
    dot.onclick = ()=> goTo(i);
    dotsWrap.appendChild(dot);
  });

  const heroSlides = hero.querySelectorAll('.hero-slide');
  const dots = dotsWrap.querySelectorAll('span');
  let current = 0;

  function goTo(i){
    heroSlides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = i;
    heroSlides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  if(heroTimer) clearInterval(heroTimer);
  heroTimer = setInterval(()=>{
    goTo((current+1) % heroSlides.length);
  }, Math.max(1500, intervalMs || 4000));
}

async function loadHero(){
  try{
    const rows = await jget('/api/home/slides');
    const slides = (Array.isArray(rows) ? rows : []).map(x=>({
      imageUrl: x.imageUrl || x.image_url || '',
      linkUrl: x.linkUrl || x.link_url || ''
    })).filter(x=>x.imageUrl);
    startHero(slides, 4000);
  }catch(_){
    startHero([], 4000);
  }
}

/* ===========================
   3) Ads
   - Featured should ONLY show featured=true
   - Latest shows all published
=========================== */
async function loadFeatured(){
  const grid = document.getElementById('featuredGrid');
  grid.innerHTML = '';
  try{
    // ✅ الأفضل: endpoint خاص بالمميز
    const ads = await jget('/api/ads/featured');
    const items = Array.isArray(ads) ? ads : [];
    grid.innerHTML =
      items.map(a=>renderAdCard(a, true)).join('') ||
      `<div style="color:rgba(255,255,255,.65)">لا توجد إعلانات مميزة</div>`;
  }catch(_){
    grid.innerHTML = `<div style="color:rgba(255,255,255,.65)">تعذر تحميل الإعلانات المميزة</div>`;
  }
}

async function loadLatest(){
  const grid = document.getElementById('latestGrid');
  grid.innerHTML = '';
  try{
    const ads = await jget('/api/ads');
    const items = Array.isArray(ads) ? ads : [];
    grid.innerHTML =
      items.map(a=>renderAdCard(a, false)).join('') ||
      `<div style="color:rgba(255,255,255,.65)">لا توجد إعلانات</div>`;
  }catch(_){
    grid.innerHTML = `<div style="color:rgba(255,255,255,.65)">تعذر تحميل أحدث الإعلانات</div>`;
  }
}

/* ===========================
   4) Categories
=========================== */
async function loadCats(){
  const grid = document.getElementById('catsGrid');
  grid.innerHTML = '';
  try{
    const cats = await jget('/api/categories');
    const items = Array.isArray(cats) ? cats : [];
    grid.innerHTML = items.slice(0,12).map(c=>{
      const name = safeText(c.name) || '—';
      return `<div class="category" data-id="${c.id}">${name}</div>`;
    }).join('') || `<div style="color:rgba(255,255,255,.65)">لا توجد أقسام</div>`;
  }catch(_){
    grid.innerHTML = `<div style="color:rgba(255,255,255,.65)">تعذر تحميل الأقسام</div>`;
  }
}

/* ===========================
   Search
=========================== */
document.getElementById('searchBtn').addEventListener('click', ()=>{
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  window.location.href = '/categories?q=' + encodeURIComponent(q);
});

/* ===========================
   Init
=========================== */
(async function init(){
  await loadBrand();
  await loadHero();
  await loadFeatured();
  await loadLatest();
  await loadCats();
})();
</script>

</body>
</html>
