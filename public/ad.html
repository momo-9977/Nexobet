<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تفاصيل الإعلان</title>
  <style>
    :root {
      --bg: #0a0f1d;
      --card-bg: #161e2d;
      --accent: #3b82f6;
      --success: #22c55e;
      --text: #f8fafc;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: -apple-system, system-ui, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
    }
    .page { max-width: 500px; margin: 0 auto; padding: 12px; }

    /* Header */
    .top-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; background: rgba(255,255,255,0.03);
      border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
    }
    .nav-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 13px;
    }

    /* Slider Area */
    .main-card {
      background: var(--card-bg); border-radius: 25px; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
    }
    .slider {
      position: relative; height: 300px; background: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .slide {
      position: absolute; inset: 0; opacity: 0; transition: 0.4s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .slide.active { opacity: 1; z-index: 2; }
    .slide img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; }

    /* Content */
    .content-padding { padding: 20px; }
    .header-info { text-align: right; margin-bottom: 15px; }
    .title { margin: 0; font-size: 20px; font-weight: 800; color: #fff; }
    .date { font-size: 12px; color: var(--muted); display: block; margin-top: 4px; }

    .price-tag {
      display: inline-block; background: rgba(59, 130, 246, 0.1);
      color: var(--accent); padding: 8px 16px; border-radius: 12px;
      font-size: 22px; font-weight: 900; margin-top: 10px; border-right: 4px solid var(--accent);
    }

    .description {
      background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px;
      margin-top: 20px; text-align: center; font-size: 14px; color: #cbd5e1;
      border: 1px dashed rgba(255,255,255,0.1);
    }

    /* Action Buttons */
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
    .action-btn {
      height: 50px; border-radius: 15px; border: none; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; transition: 0.2s; text-decoration: none; font-size: 15px; color: white;
    }
    .btn-call { background: linear-gradient(135deg, #2563eb, #3b82f6); box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
    .btn-wa { background: linear-gradient(135deg, #16a34a, #22c55e); box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
    .action-btn:active { transform: scale(0.95); }

    /* Modal / Lightbox */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 9999; align-items: center; justify-content: center;
    }
    .modal.open { display: flex; }
    .modal img { max-width: 95%; max-height: 90%; object-fit: contain; }

    /* Dots */
    .dots { position: absolute; bottom: 12px; display: flex; gap: 5px; z-index: 10; }
    .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
    .dot.active { background: #fff; width: 18px; border-radius: 10px; }
  </style>
</head>
<body>

<div class="page">
  <div class="top-nav">
    <a href="/" class="nav-btn">الرئيسية</a>
    <div style="font-weight: bold; font-size: 14px;">تفاصيل الإعلان</div>
    <button class="nav-btn" onclick="history.back()">رجوع</button>
  </div>

  <div id="ad-container">
    <div style="text-align:center; padding:50px; color:var(--muted);">جاري التحميل...</div>
  </div>
</div>

<div class="modal" id="modal" onclick="this.classList.remove('open')">
  <img id="modal-img">
</div>

<script>
  async function jget(url){
  const res = await fetch(url, { credentials:'include' });
  const data = await res.json().catch(() => ({}));
  if(!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
  return data;
}

  function absUrl(u){
    if(!u) return '';
    return /^https?:\/\//i.test(u) || u.startsWith('data:') ? u : (u.startsWith('/') ? u : '/' + u);
  }

  async function init(){
    const id = new URLSearchParams(location.search).get('id');
    if(!id) return;
    try {
      const ad = await jget('/api/ads/' + encodeURIComponent(id));
      render(ad);
    } catch(e) { document.getElementById('ad-container').innerHTML = "تعذر تحميل البيانات"; }
  }

  function render(ad){
    const container = document.getElementById('ad-container');
    
    // جمع كل الصور بشكل صحيح لتعمل جميعها
    let media = [];
    if (Array.isArray(ad.images)) {
      media = ad.images.map(x => absUrl(typeof x === 'string' ? x : x.url)).filter(Boolean);
    }
    if (media.length === 0 && ad.image) media.push(absUrl(ad.image));
    if (media.length === 0) media.push('data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" fill="%23161e2d"><rect width="100%25" height="100%25"/></svg>');

    const phone = String(
  ad.phone ||
  ad.ownerPhone ||
  (ad.owner && ad.owner.phone) ||
  ad.owner_phone ||
  ''
).replace(/[^\d+]/g,'');
const price = (ad.price !== undefined && ad.price !== null && ad.price !== '')
  ? Number(ad.price).toLocaleString('fr-MA') + " د.م"
  : "اتصل للثمن";

    container.innerHTML = `
      <div class="main-card">
        <div class="slider" id="slider">
          ${media.map((img, i) => `
            <div class="slide ${i===0?'active':''}" data-idx="${i}">
              <img src="${img}" onclick="showModal('${img}')">
            </div>
          `).join('')}
          <div class="dots">
            ${media.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
          </div>
        </div>

        <div class="content-padding">
          <div class="header-info">
            <h1 class="title">${ad.title || 'بدون عنوان'}</h1>
            <span class="date">📅 نُشر في: ${ad.created_at ? new Date(ad.created_at).toLocaleDateString('ar-MA') : 'اليوم'}</span>
            <div class="price-tag">${price}</div>
          </div>

          <div class="description">
            <div style="color:var(--accent); font-weight:bold; font-size:12px; margin-bottom:5px;">وصف المنتج</div>
            ${ad.description || 'لا يوجد وصف.'}
          </div>

          <div class="btn-group">
  ${phone ? `
    <a href="tel:${phone}" class="action-btn btn-call">📞 إتصال</a>
    <a href="https://wa.me/${phone.replace('+','')}" target="_blank" class="action-btn btn-wa">💬 واتساب</a>
  ` : `
    <div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:10px 0;">
      رقم الهاتف غير متوفر
    </div>
  `}
</div>
        </div>
      </div>
    `;
    setupSlider();
  }

  function showModal(src){
    const m = document.getElementById('modal');
    document.getElementById('modal-img').src = src;
    m.classList.add('open');
  }

  let current = 0;
  function setupSlider(){
    const slider = document.getElementById('slider');
    let startX = 0;
    slider.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive:true});
    slider.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if(Math.abs(diff) > 50) move(diff > 0 ? 1 : -1);
    }, {passive:true});
  }

  function move(dir){
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    if(slides.length <= 1) return;
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (current + dir + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  init();
</script>
</body>
</html>
