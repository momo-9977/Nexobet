<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>نشر إعلان</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071024;
  color:#e6eef8;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.04);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:14px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0c162c;
  color:white;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  background:#2ea3ff;
  color:white;
}

.error{
  color:#ffb4b4;
  margin-bottom:10px;
}

.preview img{
  width:100px;
  margin-right:8px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>نشر إعلان جديد</h2>

<div id="errorBox" class="error"></div>
<div id="statusBox"></div>

<form id="postForm">

<label>العنوان</label>
<input id="title" required>

<label>الوصف</label>
<textarea id="description" required></textarea>

<label>الثمن (د.م)</label>
<input type="number" id="price" min="0" required>

<label>المدينة</label>
<input id="city">

<label>التصنيف</label>
<select id="category" required>
<option value="">اختر القسم</option>
<option value="phones">الهواتف</option>
<option value="cars">السيارات</option>
<option value="homes">العقارات</option>
<option value="furniture">الأثاث</option>
<option value="other">أخرى</option>
</select>

<label>صور (حد أقصى 3 صور — 10MB لكل صورة)</label>
<input type="file" id="images" accept="image/*" multiple>
<div class="preview" id="imagePreview"></div>

<label>فيديو (اختياري — حد أقصى 1GB)</label>
<input type="file" id="video" accept="video/*">

<button type="submit">نشر الإعلان</button>

</form>
</div>

</div>

<script>
const MAX_IMAGES = 3;
const MAX_IMAGE_SIZE = 10485760;
const MAX_VIDEO_SIZE = 1073741824;

const imageInput = document.getElementById('images');
const preview = document.getElementById('imagePreview');
const errorBox = document.getElementById('errorBox');
const statusBox = document.getElementById('statusBox');

imageInput.addEventListener('change', ()=>{
  preview.innerHTML='';
  errorBox.textContent='';

  const files = Array.from(imageInput.files);

  if(files.length > MAX_IMAGES){
    errorBox.textContent='مسموح فقط 3 صور.';
    imageInput.value='';
    return;
  }

  for(let f of files){
    if(f.size > MAX_IMAGE_SIZE){
      errorBox.textContent='إحدى الصور أكبر من 10MB.';
      imageInput.value='';
      return;
    }

    const img=document.createElement('img');
    img.src=URL.createObjectURL(f);
    preview.appendChild(img);
  }
});

document.getElementById('postForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  errorBox.textContent='';
  statusBox.textContent='';

  const videoFile = document.getElementById('video').files[0];
  if(videoFile && videoFile.size > MAX_VIDEO_SIZE){
    errorBox.textContent='الفيديو أكبر من 1GB.';
    return;
  }

  const fd = new FormData();
  fd.append('title', document.getElementById('title').value.trim());
  fd.append('description', document.getElementById('description').value.trim());
  fd.append('price', document.getElementById('price').value);
  fd.append('city', document.getElementById('city').value.trim());
  fd.append('category', document.getElementById('category').value);

  const imageFiles = Array.from(imageInput.files).slice(0,MAX_IMAGES);
  imageFiles.forEach(f=> fd.append('images',f));

  if(videoFile) fd.append('video', videoFile);

  try{
    statusBox.textContent='جارٍ الإرسال...';

    const res = await fetch('/api/ads',{
      method:'POST',
      body:fd,
      credentials:'include'
    });

    if(res.status === 401){
      statusBox.textContent='يجب تسجيل الدخول أولاً';
      setTimeout(()=> location.href='/login',1000);
      return;
    }

    if(!res.ok){
      const err = await res.json().catch(()=>({message:'فشل الإرسال'}));
      errorBox.textContent=err.message || 'فشل الإرسال';
      statusBox.textContent='';
      return;
    }

    const data = await res.json();
    statusBox.textContent='تم نشر الإعلان بنجاح ✔';

    setTimeout(()=>{
      location.href='/ad?id='+encodeURIComponent(data.ad.id);
    },800);

  }catch(err){
    errorBox.textContent='خطأ في الاتصال بالسيرفر';
    statusBox.textContent='';
  }

});
</script>

</body>
</html>
