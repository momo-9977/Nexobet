<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Samsar — إنشاء حساب</title>

<style>
:root{
  --bg-0:#050b18;
  --bg-1:#0a1326;
  --bg-2:#0f1d38;
  --card-bg:rgba(255,255,255,0.06);
  --card-border:rgba(255,255,255,0.10);
  --text:#edf4ff;
  --muted:#9fb0d0;
  --accent:#38bdf8;
  --accent2:#2563eb;
  --premium:#f59e0b;
  --premium-2:#fde68a;
  --danger:#ef4444;
  --ok:#34d399;
  --shadow:0 30px 80px rgba(0,0,0,.45);
  --glow:0 0 0 1px rgba(255,255,255,.05), 0 20px 50px rgba(37,99,235,.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Inter,Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 20%, rgba(56,189,248,.16), transparent 22%),
    radial-gradient(circle at 85% 15%, rgba(245,158,11,.14), transparent 20%),
    radial-gradient(circle at 50% 100%, rgba(37,99,235,.18), transparent 30%),
    linear-gradient(180deg,var(--bg-0),var(--bg-1) 45%,var(--bg-2));
  overflow-x:hidden;
}

body::before,
body::after{
  content:"";
  position:fixed;
  pointer-events:none;
  z-index:0;
  filter:blur(60px);
  opacity:.55;
}

body::before{
  width:260px;height:260px;
  top:6%;right:8%;
  background:radial-gradient(circle, rgba(245,158,11,.28), transparent 70%);
}

body::after{
  width:320px;height:320px;
  bottom:4%;left:6%;
  background:radial-gradient(circle, rgba(56,189,248,.22), transparent 70%);
}

.auth-shell{
  position:relative;
  z-index:1;
  width:100%;
  max-width:520px;
}

.auth-card{
  position:relative;
  border-radius:28px;
  padding:28px;
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  border:1px solid var(--card-border);
  box-shadow:var(--shadow), var(--glow);
  backdrop-filter:blur(18px);
  overflow:hidden;
}

.auth-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(255,255,255,.10), transparent 30%, transparent 70%, rgba(255,255,255,.04));
  pointer-events:none;
}

.auth-card::after{
  content:"";
  position:absolute;
  top:-90px;
  left:-60px;
  width:220px;
  height:220px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(56,189,248,.18), transparent 70%);
  pointer-events:none;
}

.brand-wrap{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  margin-bottom:22px;
}

.brand-badge{
  width:84px;
  height:84px;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg, rgba(245,158,11,.96), rgba(253,230,138,.95));
  color:#0f172a;
  font-size:30px;
  font-weight:900;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.6),
    0 18px 40px rgba(245,158,11,.28);
  border:1px solid rgba(255,255,255,.35);
  margin-bottom:14px;
}

.brand-title{
  margin:0;
  font-size:28px;
  font-weight:900;
  letter-spacing:.3px;
  background:linear-gradient(135deg,#ffffff,#dbeafe 55%,#fde68a);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.msg{
  display:none;
  padding:12px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.10);
  margin-bottom:14px;
  font-weight:800;
  position:relative;
  z-index:2;
  background:rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
}
.msg.ok{
  color:#bbf7d0;
  border-color:rgba(52,211,153,.24);
  background:rgba(52,211,153,.10);
}
.msg.err{
  color:#fecaca;
  border-color:rgba(239,68,68,.24);
  background:rgba(239,68,68,.10);
}

form{
  position:relative;
  z-index:2;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media (max-width:560px){
  .grid2{grid-template-columns:1fr}
}

.field{
  margin-bottom:14px;
}

label{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  font-weight:800;
  color:#dbe7ff;
}

.input{
  position:relative;
  display:flex;
  align-items:center;
}

.input span{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  opacity:.92;
  pointer-events:none;
}

input{
  width:100%;
  height:56px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.045);
  color:var(--text);
  outline:none;
  padding:0 48px 0 16px;
  font-size:15px;
  transition:.18s ease;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}

input::placeholder{
  color:#8da0c3;
}

input:focus{
  border-color:rgba(56,189,248,.55);
  background:rgba(255,255,255,.07);
  box-shadow:
    0 0 0 4px rgba(56,189,248,.10),
    0 10px 30px rgba(37,99,235,.14);
}

.btn{
  width:100%;
  height:58px;
  border:none;
  cursor:pointer;
  border-radius:18px;
  font-size:16px;
  font-weight:900;
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 18px 35px rgba(37,99,235,.28);
  transition:.18s ease;
  margin-top:6px;
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 24px 40px rgba(37,99,235,.34);
}
.btn:disabled{
  opacity:.6;
  cursor:not-allowed;
  transform:none;
}

.footer{
  margin-top:16px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
  position:relative;
  z-index:2;
}
.footer a{
  color:#fde68a;
  text-decoration:none;
  font-weight:800;
}

@media (max-width:560px){
  body{padding:16px}
  .auth-card{
    border-radius:24px;
    padding:22px 18px;
  }
  .brand-badge{
    width:72px;
    height:72px;
    border-radius:22px;
    font-size:26px;
  }
  .brand-title{
    font-size:24px;
  }
  input,.btn{
    height:54px;
    border-radius:16px;
  }
}
</style>
</head>

<body>

<div class="auth-shell">
  <section class="auth-card">
    <div class="brand-wrap">
      <div class="brand-badge">S</div>
      <h1 class="brand-title">إنشاء حساب</h1>
    </div>

    <div id="msg" class="msg"></div>

    <form id="form">
      <div class="grid2">
        <div class="field">
          <label>الاسم الكامل</label>
          <div class="input">
            <span>👤</span>
            <input id="nameInput" required autocomplete="name" placeholder="مثال: محمد..." />
          </div>
        </div>

        <div class="field">
          <label>رقم الهاتف</label>
          <div class="input">
            <span>📱</span>
            <input id="phoneInput" required autocomplete="tel" placeholder="06XXXXXXXX" />
          </div>
        </div>
      </div>

      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="input">
          <span>📧</span>
          <input id="emailInput" type="email" required autocomplete="email" placeholder="name@email.com" />
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label>كلمة المرور</label>
          <div class="input">
            <span>🔑</span>
            <input id="passInput" type="password" minlength="6" required autocomplete="new-password" placeholder="••••••••" />
          </div>
        </div>

        <div class="field">
          <label>تأكيد كلمة المرور</label>
          <div class="input">
            <span>✅</span>
            <input id="confirmInput" type="password" minlength="6" required autocomplete="new-password" placeholder="••••••••" />
          </div>
        </div>
      </div>

      <button class="btn" id="submitBtn" type="submit">تسجيل الحساب</button>
    </form>

    <div class="footer">
      عندك حساب؟ <a href="/login">سجل الدخول</a>
    </div>
  </section>
</div>

<script>
const form = document.getElementById('form');
const msg = document.getElementById('msg');
const btn = document.getElementById('submitBtn');

function showMsg(text, ok=true){
  msg.style.display = 'block';
  msg.className = 'msg ' + (ok ? 'ok' : 'err');
  msg.textContent = text;
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  msg.style.display = 'none';

  const name = document.getElementById('nameInput').value.trim();
  const phone = document.getElementById('phoneInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passInput').value;
  const confirm = document.getElementById('confirmInput').value;

  if(password.length < 6 || password !== confirm){
    showMsg('كلمة السر قصيرة أو التأكيد غير مطابق', false);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'جاري الإرسال...';

  try{
    const res = await fetch('/api/auth/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body: JSON.stringify({ name, phone, email, password })
    });

    const data = await res.json().catch(()=> ({}));
    if(!res.ok){
      showMsg(data.message || data.error || 'فشل إنشاء الحساب', false);
      btn.disabled = false;
      btn.textContent = 'تسجيل الحساب';
      return;
    }

    showMsg('تم التسجيل بنجاح ✅ توجيه للرئيسية...', true);
    setTimeout(()=> window.location.href='/', 800);

  }catch(err){
    showMsg('خطأ في الاتصال بالسيرفر', false);
    btn.disabled = false;
    btn.textContent = 'تسجيل الحساب';
  }
});
</script>

</body>
</html>
