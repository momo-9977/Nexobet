<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Le Marché - نشر إعلان</title>

<style>
:root{
  --bg-0:#071024;
  --bg-1:#081426;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(255,255,255,0.05);
  --text:#e6eef8;
  --muted:#9aa8c2;
  --accent:#2ea3ff;
  --accent-2:#60a5fa;
  --success:#34d399;
  --danger:#ef4444;

}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(46,163,255,0.08), transparent 20%),
    linear-gradient(180deg,var(--bg-0),var(--bg-1));
  color:var(--text);
  padding-bottom:90px;
}

/* Back Button */
.back-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:48px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(6px);
  z-index:100;
}
.back-btn:hover{transform:translateY(-3px)}

/* Container */
.container{
  max-width:900px;
  margin:80px auto 40px;
  padding:20px;
}

.card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  padding:24px;
  border-radius:20px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 45px rgba(0,0,0,.4);
}

/* Form */
label{
  font-weight:700;
  font-size:14px;
}

input,textarea,select{
  width:100%;
  padding:14px;
  margin:8px 0 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.03);
  color:white;
  font-size:14px;
  outline:none;
  transition:.2s;
}

input:focus,textarea:focus,select:focus{
  border-color:rgba(46,163,255,.5);
  box-shadow:0 0 0 6px rgba(46,163,255,.08);
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-weight:800;
  font-size:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:white;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 30px rgba(46,163,255,.25);
}

.error{color:var(--danger);margin-bottom:10px}
.success{color:var(--success);margin-bottom:10px}

.preview{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.preview img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.1);
}


</style>
</head>

<body>

<div class="back-btn" onclick="history.back()">←</div>

<div class="container">
<div class="card">

<h2 style="margin-top:0">نشر إعلان جديد</h2>

<div id="errorBox" class="error"></div>
<div id="statusBox" class="success"></div>

<form id="postForm">

<label>العنوان</label>
<input id="title" required>

<label>الوصف</label>
<textarea id="description" rows="4" required></textarea>

<label>الثمن (د.م)</label>
<input type="number" id="price" min="0" required>

<label>المدينة</label>
<input id="city">

<label>التصنيف</label>
<select id="category" required>
<option value="">اختر القسم</option>
<option value="phones">الهواتف</option>
<option value="cars">السيارات</option>
<option value="homes">العقارات</option>
<option value="furniture">الأثاث</option>
<option value="other">أخرى</option>
</select>

<label>صور (حد أقصى 3 صور — 10MB لكل صورة)</label>
<input type="file" id="images" accept="image/*" multiple>
<div class="preview" id="imagePreview"></div>

<label>فيديو (اختياري — حد أقصى 1GB)</label>
<input type="file" id="video" accept="video/*">

<button type="submit">نشر الإعلان</button>

</form>
</div>
</div>
<!-- NAVIGATION -->
<nav class="modern-flat-nav">

  <a href="/" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-4v-6H8v6H4a1 1 0 0 1-1-1v-9.5z"/>
    </svg>
    <span>الرئيسية</span>
  </a>

  <a href="/categories" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M3 6h7v7H3V6zm11 0h7v7h-7V6zM3 15h7v7H3v-7zm11 0h7v7h-7v-7z"/>
    </svg>
    <span>الأقسام</span>
  </a>

  <a href="/post-ad" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span>نشر</span>
  </a>

  <a href="/profile" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="7" r="3"/>
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    </svg>
    <span>بروفايل</span>
  </a>

</nav>

<script>
const MAX_IMAGES=3;
const MAX_IMAGE_SIZE=10485760;
const MAX_VIDEO_SIZE=1073741824;

const imageInput=document.getElementById('images');
const preview=document.getElementById('imagePreview');
const errorBox=document.getElementById('errorBox');
const statusBox=document.getElementById('statusBox');

imageInput.addEventListener('change',()=>{
  preview.innerHTML='';
  errorBox.textContent='';
  const files=Array.from(imageInput.files);
  if(files.length>MAX_IMAGES){
    errorBox.textContent='مسموح فقط 3 صور.';
    imageInput.value='';
    return;
  }
  for(let f of files){
    if(f.size>MAX_IMAGE_SIZE){
      errorBox.textContent='إحدى الصور أكبر من 10MB.';
      imageInput.value='';
      return;
    }
    const img=document.createElement('img');
    img.src=URL.createObjectURL(f);
    preview.appendChild(img);
  }
});

document.getElementById('postForm').addEventListener('submit',async(e)=>{
  e.preventDefault();
  errorBox.textContent='';
  statusBox.textContent='جارٍ الإرسال...';

  const videoFile=document.getElementById('video').files[0];
  if(videoFile && videoFile.size>MAX_VIDEO_SIZE){
    errorBox.textContent='الفيديو أكبر من 1GB.';
    statusBox.textContent='';
    return;
  }

  const fd=new FormData();
  fd.append('title',title.value.trim());
  fd.append('description',description.value.trim());
  fd.append('price',price.value);
  fd.append('city',city.value.trim());
  fd.append('category',category.value);

  Array.from(imageInput.files).slice(0,MAX_IMAGES)
  .forEach(f=>fd.append('images',f));

  if(videoFile) fd.append('video',videoFile);

  const res=await fetch('/api/ads',{
    method:'POST',
    body:fd,
    credentials:'include'
  });

  if(res.status===401){
    location.href='/login';
    return;
  }

  if(!res.ok){
    errorBox.textContent='فشل نشر الإعلان';
    statusBox.textContent='';
    return;
  }

  const data=await res.json();
  statusBox.textContent='تم نشر الإعلان بنجاح ✔';

  setTimeout(()=>{
    location.href='/ad?id='+encodeURIComponent(data.ad.id);
  },800);
});
</script>

</body>
</html>
