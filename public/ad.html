<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>تفاصيل الإعلان</title>
  <style>
    :root {
      --primary: #3b82f6;
      --secondary: #1e293b;
      --accent: #25d366;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --glass: rgba(255, 255, 255, 0.03);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg); color: var(--text-main); line-height: 1.5;
    }

    .container { max-width: 500px; margin: 0 auto; padding: 12px; }

    /* Header Nav */
    .nav-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; margin-bottom: 10px;
    }
    .back-btn {
      background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
      color: white; padding: 6px 14px; border-radius: 10px; cursor: pointer; font-size: 13px;
    }

    /* Media Slider */
    .main-card {
      background: var(--card-bg); border-radius: 24px; overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
    }
    .slider-area {
      position: relative; height: 320px; background: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .slide {
      position: absolute; inset: 0; opacity: 0; transition: 0.4s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .slide.active { opacity: 1; z-index: 2; }
    .slide img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; }

    /* Info Section */
    .info-section { padding: 20px; }
    .top-meta { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .title { margin: 0; font-size: 19px; font-weight: 700; flex: 1; }
    .price-tag {
      background: rgba(59, 130, 246, 0.15); color: #60a5fa;
      padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 17px; white-space: nowrap;
    }
    .date { color: var(--text-muted); font-size: 12px; margin-top: 5px; display: block; }

    /* Description Box */
    .description-box {
      margin-top: 18px; padding: 15px; background: rgba(0,0,0,0.2);
      border-radius: 16px; font-size: 14px; color: #cbd5e1; text-align: center;
    }
    .desc-label { display: block; color: var(--primary); font-weight: bold; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; }

    /* Premium Buttons Layout */
    .action-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;
    }
    .action-btn {
      height: 48px; border-radius: 14px; border: none; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; transition: 0.2s; text-decoration: none; font-size: 14px;
    }
    .btn-call { background: var(--primary); color: white; }
    .btn-whatsapp { background: var(--accent); color: white; }
    .action-btn:active { transform: scale(0.96); }

    /* Fullscreen Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 9999; align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 95%; max-height: 85%; object-fit: contain; }

    /* Indicators */
    .dots { position: absolute; bottom: 12px; display: flex; gap: 5px; z-index: 10; }
    .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; }
    .dot.active { background: white; width: 15px; border-radius: 4px; }

    @media (max-width: 400px) { .slider-area { height: 260px; } }
  </style>
</head>
<body>

<div class="container">
  <div class="nav-header">
    <button class="back-btn" onclick="history.back()">✕ إغلاق</button>
    <div style="font-size: 14px; font-weight: 600; opacity: 0.8;">تفاصيل الإعلان</div>
    <button class="back-btn" onclick="location.href='/'">الرئيسية</button>
  </div>

  <div id="content-loader">
    <div style="text-align:center; padding:40px; color:var(--text-muted);">جاري التحميل...</div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
  async function loadAd() {
    const id = new URLSearchParams(window.location.search).get('id');
    if(!id) return;
    try {
      const res = await fetch('/api/ads/' + id);
      const ad = await res.json();
      renderUI(ad);
    } catch (err) { console.error("Error fetching ad"); }
  }

  function renderUI(ad) {
    const root = document.getElementById('content-loader');
    const media = ad.images || [];
    if(ad.image && !media.includes(ad.image)) media.unshift(ad.image);
    
    const formattedPrice = ad.price ? Number(ad.price).toLocaleString('fr-MA') + " د.م" : "اتصل للثمن";
    const phone = String(ad.phone || '').replace(/[^\d+]/g,'');

    root.innerHTML = `
      <div class="main-card">
        <div class="slider-area" id="slider-area">
          ${media.map((m, i) => `
            <div class="slide ${i===0?'active':''}" data-idx="${i}">
              <img src="${m}" onclick="openZoom('${m}')">
            </div>
          `).join('')}
          <div class="dots">
            ${media.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
          </div>
        </div>

        <div class="info-section">
          <div class="top-meta">
            <h1 class="title">${ad.title || 'إعلان بدون عنوان'}</h1>
            <div class="price-tag">${formattedPrice}</div>
          </div>
          <span class="date">📅 نُشر في: ${ad.created_at ? new Date(ad.created_at).toLocaleDateString('ar-MA') : 'اليوم'}</span>

          <div class="description-box">
            <span class="desc-label">وصف الإعلان</span>
            ${ad.description || 'لا يوجد وصف متاح حالياً.'}
          </div>

          <div class="action-grid">
            <a href="tel:${phone}" class="action-btn btn-call">
              <span>📞 إتصال</span>
            </a>
            <a href="https://wa.me/${phone.replace('+','')}" target="_blank" class="action-btn btn-whatsapp">
              <span>💬 واتساب</span>
            </a>
          </div>
        </div>
      </div>
    `;
    setupSwipe();
  }

  function openZoom(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = src;
    lb.classList.add('open');
  }

  let currentIdx = 0;
  function setupSwipe() {
    const area = document.getElementById('slider-area');
    if(!area) return;
    let startX = 0;
    area.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    area.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if(Math.abs(diff) > 40) move(diff > 0 ? 1 : -1);
    });
  }

  function move(dir) {
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    if(slides.length <= 1) return;
    slides[currentIdx].classList.remove('active');
    dots[currentIdx].classList.remove('active');
    currentIdx = (currentIdx + dir + slides.length) % slides.length;
    slides[currentIdx].classList.add('active');
    dots[currentIdx].classList.add('active');
  }

  loadAd();
</script>

</body>
</html>
