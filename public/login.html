<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سمسار - تسجيل الدخول</title>
  <style>
    :root{
      --bg:#08101d; --bg-soft:#0c1524; --text:#f8fafc; --muted:#94a3b8;
      --blue:#2563eb; --blue-2:#3b82f6; --shadow:0 18px 40px rgba(0,0,0,0.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Arial, sans-serif;color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 25%),
        radial-gradient(circle at bottom left, rgba(56,189,248,0.12), transparent 25%),
        linear-gradient(180deg,var(--bg) 0%, var(--bg-soft) 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:20px;
    }

    .auth-panel{
      width:100%;max-width:520px;background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:22px;
      box-shadow:var(--shadow);backdrop-filter:blur(12px);
    }

    h2{margin:0 0 6px;font-size:28px;color:white}
    p.lead{margin:0 0 16px;color:var(--muted)}

    .field-box{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    label{font-size:13px;color:#e6eef8;font-weight:700}
    input[type="text"], input[type="password"]{
      padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.03);color:var(--text);outline:none;font-size:14px;
    }
    input::placeholder{color:var(--muted)}
    input:focus{box-shadow:0 0 0 6px rgba(59,130,246,0.06);border-color:rgba(59,130,246,0.28)}

    .remember-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .remember-check{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:14px}
    .remember-check input{width:18px;height:18px}

    .auth-btn{
      width:100%;padding:14px;border-radius:14px;border:none;font-weight:800;
      background:linear-gradient(135deg,var(--blue),var(--blue-2));color:white;font-size:15px;
      cursor:pointer;box-shadow:0 10px 22px rgba(37,99,235,0.18);
    }
    .divider{margin:12px 0;text-align:center;color:var(--muted);font-size:13px}

    .google-btn{
      width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.02);color:white;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
    }

    .auth-footer{margin-top:12px;color:var(--muted);text-align:center;font-size:14px}
    .auth-footer a{color:#bfdbfe;text-decoration:none;font-weight:700}

    /* toast */
    .toast {
      position:fixed; left:50%; transform:translateX(-50%); bottom:28px;
      background:rgba(0,0,0,0.7); color:white; padding:12px 18px; border-radius:10px;
      box-shadow:0 8px 20px rgba(0,0,0,0.4); font-weight:600; display:none; z-index:2000;
    }
    .toast.error{background:linear-gradient(90deg,#ef4444,#c026d3)}
    .toast.show{display:block; animation:pop .2s ease}
    @keyframes pop { from { transform: translateX(-50%) translateY(6px); opacity:0 } to { transform: translateX(-50%) translateY(0); opacity:1 } }

    @media (max-width:520px){
      .auth-panel{padding:16px}
    }
  </style>
</head>
<body>
  <div class="auth-panel" role="main" aria-labelledby="loginTitle">
    <div class="auth-top">
      <h2 id="loginTitle">تسجيل الدخول</h2>
      <p class="lead">دخل المعلومات ديالك باش تدخل للحساب.</p>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="field-box">
        <label for="loginIdentifier">رقم الهاتف أو البريد الإلكتروني</label>
        <input type="text" id="loginIdentifier" name="identifier"
               placeholder="06XXXXXXXX أو example@email.com" required />
      </div>

      <div class="field-box">
        <label for="loginPassword">كلمة المرور</label>
        <input type="password" id="loginPassword" name="password" placeholder="أدخل كلمة المرور" required />
      </div>

      <div class="remember-row">
        <label class="remember-check">
          <input type="checkbox" id="rememberMe" />
          <span>تذكرني</span>
        </label>

        <a href="#" class="forgot-link" id="forgotLink">نسيت كلمة المرور؟</a>
      </div>

      <button type="submit" class="auth-btn" id="submitBtn">دخول للحساب</button>

      <div class="divider"><span>أو</span></div>

      <button type="button" class="google-btn" id="googleBtn">
        <span style="background:white;color:#111;padding:6px 9px;border-radius:50%;font-weight:800">G</span>
        <span>تسجيل الدخول عبر Google</span>
      </button>
    </form>

    <div class="auth-footer">
      ما عندكش حساب؟
      <a href="register.html">إنشاء حساب جديد</a>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const identifierInput = document.getElementById('loginIdentifier');
      const passwordInput = document.getElementById('loginPassword');
      const rememberChk = document.getElementById('rememberMe');
      const toastEl = document.getElementById('toast');
      const submitBtn = document.getElementById('submitBtn');
      const googleBtn = document.getElementById('googleBtn');
      const forgotLink = document.getElementById('forgotLink');

      // إذا كان محفوظ سابقاً نعمر الحقل
      const savedId = localStorage.getItem('samsar_login_identifier');
      if (savedId) {
        identifierInput.value = savedId;
        rememberChk.checked = true;
      }

      function showToast(message, isError = false) {
        toastEl.textContent = message;
        toastEl.className = 'toast' + (isError ? ' error' : '') + ' show';
        setTimeout(() => { toastEl.classList.remove('show'); }, 3200);
      }

      async function handleLogin(e) {
        e.preventDefault();
        const identifier = identifierInput.value.trim();
        const password = passwordInput.value;

        if (!identifier || !password) {
          showToast('عمر جميع الخانات', true);
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'جاري المحاولة...';

        try {
          const payload = {
            // السيرفر عنده endpoint يتوقع { email, password }
            // نرسلو identifier كـ email (إذا بغينا دعم خاص بالـ phone لازم نعدل السيرفر)
            email: identifier,
            password: password
          };

          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            credentials: 'include' // مهم باش المتصفح يقبل الكوكي اللي يحطها السيرفر
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            showToast(data.message || 'فشل تسجيل الدخول', true);
            submitBtn.disabled = false;
            submitBtn.textContent = 'دخول للحساب';
            return;
          }

          // حفظ المعرف محلياً اذا اختار المستخدم "تذكرني"
          if (rememberChk.checked) {
            localStorage.setItem('samsar_login_identifier', identifier);
          } else {
            localStorage.removeItem('samsar_login_identifier');
          }

          showToast('تم الدخول بنجاح، غنوجهوك للرئيسية...', false);
          if (data.isAdmin) {
  window.location.href = "/admin";
} else {
  window.location.href = "/";
}
        } catch (err) {
          console.error(err);
          showToast('خطأ فالاتصال بالسيرفر', true);
          submitBtn.disabled = false;
          submitBtn.textContent = 'دخول للحساب';
        }
      }

      form.addEventListener('submit', handleLogin);

      googleBtn.addEventListener('click', () => {
        // هنا تقدر تربط OAuth flow لاحقاً
        showToast('التسجيل عبر Google غير مفعّل الآن', true);
      });

      forgotLink.addEventListener('click', (ev) => {
        ev.preventDefault();
        showToast('خاصنا نضيف صفحة استرجاع كلمة المرور لاحقاً', true);
      });
    })();
  </script>
</body>
</html>
