<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأقسام</title>

<style>
/* ===== MODERN BOTTOM NAV FIX ===== */

.modern-flat-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:999;
}

.modern-flat-item{
  flex:1;
  text-align:center;
  text-decoration:none;
  color:#6b7280;
  font-size:12px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.modern-flat-item svg{
  width:22px !important;
  height:22px !important;
  display:block;
}

.modern-flat-item.active{
  color:#16a34a;
}
/* ===== BASE ===== */

body{
  margin:0;
  font-family:'Inter',Arial,sans-serif;
  background:linear-gradient(180deg,#071024,#0c1524);
  color:#e6eef8;
  padding-bottom:90px;
}

/* ===== TOP BAR ===== */

.top-bar{
  position:sticky;
  top:0;
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  z-index:1000;
}

.back-btn{
  width:38px;
  height:38px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s ease;
}

.back-btn:hover{
  background:rgba(255,255,255,0.12);
  transform:scale(1.05);
}

.page-title{
  font-weight:700;
  font-size:16px;
}

/* ===== CONTAINER ===== */

.page{
  max-width:1100px;
  margin:25px auto;
  padding:20px;
}

/* ===== CATEGORY GRID ===== */

.category-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

.category-card{
  position:relative;
  height:230px;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s ease;
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
}

.category-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.75);
  transition:0.4s ease;
}

.category-card:hover img{
  transform:scale(1.1);
}

.category-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:18px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,0.6));
}

.category-overlay h3{
  margin:0;
  font-size:20px;
  font-weight:800;
  color:#60a5fa;
}

.category-overlay p{
  margin:4px 0 0;
  font-size:13px;
  color:#cbd5e1;
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="back-btn" onclick="window.history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </div>
  <div class="page-title">الأقسام</div>
</div>

<div class="page">

  <div class="category-grid">

    <a href="/categories?key=phones" class="category-card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200&auto=format&fit=crop">
      <div class="category-overlay">
        <h3>الهواتف</h3>
        <p>جديدة ومستعملة</p>
      </div>
    </a>

    <a href="/categories?key=cars" class="category-card">
      <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=1200&auto=format&fit=crop">
      <div class="category-overlay">
        <h3>السيارات</h3>
        <p>اقتصادية وفاخرة</p>
      </div>
    </a>

    <a href="/categories?key=homes" class="category-card">
      <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop">
      <div class="category-overlay">
        <h3>العقارات</h3>
        <p>شقق ومنازل</p>
      </div>
    </a>

    <a href="/categories?key=furniture" class="category-card">
      <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?q=80&w=1200&auto=format&fit=crop">
      <div class="category-overlay">
        <h3>الأثاث</h3>
        <p>منزلي ومكتبي</p>
      </div>
    </a>

  </div>

</div>

<!-- NAVIGATION -->
<nav class="modern-flat-nav">

  <a href="/" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-4v-6H8v6H4a1 1 0 0 1-1-1v-9.5z"/>
    </svg>
    <span>الرئيسية</span>
  </a>

  <a href="/categories" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M3 6h7v7H3V6zm11 0h7v7h-7V6zM3 15h7v7H3v-7zm11 0h7v7h-7v-7z"/>
    </svg>
    <span>الأقسام</span>
  </a>

  <a href="/post-ad" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    <span>نشر</span>
  </a>

  <a href="/profile" class="modern-flat-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="7" r="3"/>
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    </svg>
    <span>بروفايل</span>
  </a>
</nav>

</body>
</html>
